<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DW WebGL Spot — BUILD 2026-03-05T00:00:00Z-PAGES-FIX-01</title>
  <style>
    html,body{margin:0;height:100%;background:#06070c;color:#eaeefc;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    #c{display:block;width:100vw;height:100vh}
    #hud{
      position:fixed;left:12px;top:12px;padding:10px 12px;border-radius:12px;
      background:rgba(10,12,18,.60);border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,.45)
    }
    #hud b{color:#ffd36e}
  </style>
</head>
<body>
  <div id="hud"><b>BUILD</b> <span id="bid"></span></div>
  <canvas id="c"></canvas>

  <script>
    // Verifiable stamp
    const BUILD_ID = "2026-03-05T00:00:00Z-PAGES-FIX-01";
    document.getElementById("bid").textContent = BUILD_ID;
    console.log("[DW] BUILD_ID =", BUILD_ID);

    // SW purge (if any existed)
    (async () => {
      if (!("serviceWorker" in navigator)) return;
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
      } catch {}
    })();

    // Minimal animation proof (won’t freeze)
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha:false, desynchronized:true });

    function resize(){
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    addEventListener("resize", resize, {passive:true});
    resize();

    let t0 = performance.now();
    function frame(now){
      const t = (now - t0) * 0.001;
      ctx.fillStyle = "#06070c";
      ctx.fillRect(0,0,innerWidth,innerHeight);

      const cx = innerWidth*0.5, cy = innerHeight*0.55;
      const r = Math.min(innerWidth, innerHeight)*0.22*(1+0.05*Math.sin(t));
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,211,110,0.92)";
      ctx.beginPath();
      for(let a=0; a<=Math.PI*2+0.001; a+=0.12){
        const wob = 1 + 0.08*Math.sin(3*a + t*1.1);
        const x = cx + Math.cos(a)*r*wob;
        const y = cy + Math.sin(a)*r*wob;
        if(a===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();

      ctx.font = "600 14px system-ui,-apple-system,Segoe UI,Roboto,Arial";
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillText("DW WebGL Spot", 14, innerHeight-44);
      ctx.fillStyle = "rgba(255,211,110,0.92)";
      ctx.fillText("BUILD " + BUILD_ID, 14, innerHeight-24);

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
