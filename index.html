<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Design as Event — φ-Archive Layers</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#eaf2ff;background:#04060a;}
    canvas{display:block;}
    .ui{
      position:fixed;top:14px;left:14px;max-width:780px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
    }
    .ui b{letter-spacing:.2px;}
    .hud{
      position:fixed;top:14px;right:14px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
      min-width:270px;text-align:right;
    }
  </style>
</head>

<body>
  <div class="ui">
    <b>DESIGN AS EVENT — MORPHOGENETIC FIELD</b><br>
    Click → event birth • φ-lock becomes easy<br>
    φ-lock → archived colored trace (long-lived) • next φ-locks use next color (layered palimpsest)
  </div>
  <div class="hud" id="hud">events: 0<br>links: 0<br>phiLockedNow: 0<br>archive: 0</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");

    let w=0,h=0;
    function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
    addEventListener("resize", resize);
    resize();

    let t=0, frame=0, nextId=1;

    const PHI = (1 + Math.sqrt(5)) / 2;
    const INV_PHI = 1 / PHI;

    const P = {
      // births
      energyMin: 0.90,
      energyMax: 2.20,
      radiusBase: 110,
      radiusK: 220,
      lifeInit: 1.0,

      // background (not black)
      bgFade: 0.06,
      bgGlow: 0.30,
      bgVignette: 0.24,

      // pulsing ring-field
      rings: 22,
      ringPoints: 155,
      ringSpacing: 16,
      ringStart: 60,
      pulseA: 0.075,

      // linking
      edgeMaxD_factor: 0.98,

      // φ-lock becomes “relatively easy”
      phiTolerance: 0.30,       // MUCH wider => easy
      phiGate: 0.38,            // lower gate => more candidates
      phiLockFrames: 28,        // fewer frames => faster lock
      phiSpring: 0.040,
      phiDamping: 0.86,

      // event persistence when φ-locked
      baseLifeDecay: 0.989,
      phiLifeFloor: 0.58,
      phiLifeRecharge: 0.022,
      phiMaxLocksPerEvent: 4,

      // event motion
      phaseSpeed: 0.015,
      driftK: 0.06,

      // drawing
      widthNear: 3.2,
      widthFar: 0.7,
      alphaNear: 0.70,
      alphaFar: 0.08,

      // archive layer (long time)
      archiveTTL_init: 1.0,
      archiveTTL_decay: 0.00055,     // very long: ~1800 frames to fade materially
      archiveWidth: 3.6,
      archiveAlpha: 0.55,
      archiveMax: 220                // prevent infinite memory
    };

    // palette for successive φ-lock generations (distinct colors)
    const PALETTE = [
      [255,215,120], // gold
      [120,210,255], // cyan
      [255,140,200], // magenta
      [170,255,140], // green
      [210,160,255], // violet
      [255,180,120], // orange
    ];
    let paletteIndex = 0;

    // state
    let events = [];
    // edgeMemory key -> {a,b,phiScore,lockFrames,locked,targetMode,seenLockedStamp}
    const edgeMemory = new Map();

    // archive traces: { points:[{x,y}...], ttl, rgb:[r,g,b], width, alpha }
    let archive = [];

    addEventListener("click",(e)=>createEvent(e.clientX,e.clientY));

    function createEvent(x,y){
      const energy = P.energyMin + Math.random()*(P.energyMax-P.energyMin);
      const radius = P.radiusBase + P.radiusK*energy;
      events.push({
        id: nextId++,
        x,y,
        energy,
        radius,
        life: P.lifeInit,
        phase: Math.random()*Math.PI*2,
        vx: 0, vy: 0,
        lockCount: 0
      });
    }

    function clamp01(x){ return Math.max(0, Math.min(1, x)); }
    function lerp(a,b,t){ return a + (b-a)*t; }

    function depthWeight(d, maxD){
      const x = 1 - (d / Math.max(1,maxD));
      return clamp01(x*x);
    }

    function phiScoreAndMode(d, rA, rB){
      const s = d / Math.max(1e-6, Math.sqrt(rA*rB));
      const errPhi = Math.abs(s - PHI);
      const errInv = Math.abs(s - INV_PHI);
      if(errPhi <= errInv){
        return { score: clamp01(1 - (errPhi / P.phiTolerance)), mode: "phi" };
      }
      return { score: clamp01(1 - (errInv / P.phiTolerance)), mode: "invphi" };
    }

    function bentMidpoint(ax,ay,bx,by,amount){
      const mx=(ax+bx)/2, my=(ay+by)/2;
      const dx=bx-ax, dy=by-ay;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len, ny=dx/len;
      const wobble=Math.sin(t*1.1 + (ax+ay+bx+by)*0.003) * amount;
      return { x: mx + nx*wobble, y: my + ny*wobble };
    }

    function drawGradientBackground(){
      const cx=w/2, cy=h/2;
      const grd = ctx.createRadialGradient(cx, cy, Math.min(w,h)*0.05, cx, cy, Math.min(w,h)*0.95);
      grd.addColorStop(0, `rgba(18,28,44,${P.bgGlow})`);
      grd.addColorStop(0.55, `rgba(6,10,18,0.20)`);
      grd.addColorStop(1, `rgba(4,6,10,${P.bgVignette})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0,0,w,h);
      ctx.fillStyle = `rgba(4,6,10,${P.bgFade})`;
      ctx.fillRect(0,0,w,h);
    }

    function drawPulsingField(){
      const cx=w/2, cy=h/2;
      for(let r=0;r<P.rings;r++){
        const baseRadius = P.ringStart + r*P.ringSpacing;
        ctx.beginPath();
        for(let i=0;i<P.ringPoints;i++){
          const a=(i/P.ringPoints)*Math.PI*2;
          let x=cx + baseRadius*Math.cos(a);
          let y=cy + baseRadius*Math.sin(a);
          const pulse = (Math.sin(t*1.0 + r*0.18) + Math.cos(t*1.35 + a*2.0)) * 0.5;
          x += Math.sin(a*3 + t + r*0.10) * baseRadius * P.pulseA;
          y += Math.cos(a*4 + t + r*0.10) * baseRadius * P.pulseA;
          x += Math.cos(a*2.2 + t) * pulse * 2.0;
          y += Math.sin(a*2.0 + t) * pulse * 2.0;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath();
        const alpha=0.06+(r/P.rings)*0.18;
        ctx.strokeStyle=`rgba(140,210,255,${alpha})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }

    function buildActiveEdges(){
      const active = [];
      for(let i=0;i<events.length;i++){
        for(let j=i+1;j<events.length;j++){
          const a=events[i], b=events[j];
          const dx=b.x-a.x, dy=b.y-a.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          const maxD=(a.radius+b.radius)*P.edgeMaxD_factor;
          if(d < maxD){
            const near = depthWeight(d, maxD);
            const {score, mode} = phiScoreAndMode(d, a.radius, b.radius);
            const minId=Math.min(a.id,b.id), maxId=Math.max(a.id,b.id);
            const key=`${minId}-${maxId}`;
            const charge = near * (0.60 + 0.40*Math.min(a.life,b.life)) * (1 + 0.9*score);
            active.push({key,a,b,dx,dy,d,maxD,near,phiScore:score,phiMode:mode,charge});
          }
        }
      }
      return active;
    }

    function updateEdgeMemory(active){
      for(const e of active){
        const rec = edgeMemory.get(e.key) || {
          a:e.a, b:e.b,
          phiScore: 0,
          targetMode: e.phiMode,
          lockFrames: 0,
          locked: false,
          seenLockedStamp: false
        };
        rec.a=e.a; rec.b=e.b;
        if(e.phiScore > rec.phiScore){
          rec.targetMode = e.phiMode;
        }
        rec.phiScore = Math.max(rec.phiScore, e.phiScore);
        edgeMemory.set(e.key, rec);
      }
    }

    function applyPhiConvergenceAndLock(active){
      let lockedNow = 0;

      for(const e of active){
        const rec = edgeMemory.get(e.key);
        if(!rec || !rec.a || !rec.b) continue;

        const a=rec.a, b=rec.b;
        const dx=b.x-a.x, dy=b.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy) || 1;

        const base = Math.sqrt(a.radius*b.radius);
        const target = (rec.targetMode === "invphi") ? (INV_PHI*base) : (PHI*base);

        const err = Math.abs(dist - target) / Math.max(1, target);
        const score = clamp01(1 - (err / P.phiTolerance));
        rec.phiScore = Math.max(rec.phiScore, score);

        // convergence when the relation is at least a modest φ-candidate
        if(score >= P.phiGate){
          const nx=dx/dist, ny=dy/dist;
          const delta=(dist-target);
          const pull = (-delta) * P.phiSpring * (0.5 + 0.5*score);

          a.vx *= P.phiDamping; a.vy *= P.phiDamping;
          b.vx *= P.phiDamping; b.vy *= P.phiDamping;

          a.vx -= nx*pull; a.vy -= ny*pull;
          b.vx += nx*pull; b.vy += ny*pull;

          // lock accumulation
          if(score >= 0.70) rec.lockFrames += 1;
          else rec.lockFrames = Math.max(0, rec.lockFrames - 1);

          if(!rec.locked && rec.lockFrames >= P.phiLockFrames){
            rec.locked = true;
            a.lockCount = (a.lockCount||0) + 1;
            b.lockCount = (b.lockCount||0) + 1;
          }
        } else {
          rec.lockFrames = Math.max(0, rec.lockFrames - 1);
        }

        if(rec.locked){
          lockedNow++;
          // keep events perceptible
          if(a.lockCount <= P.phiMaxLocksPerEvent){
            a.life = Math.max(a.life, P.phiLifeFloor);
            a.life = Math.min(1.0, a.life + P.phiLifeRecharge * (0.7 + 0.3*score));
          }
          if(b.lockCount <= P.phiMaxLocksPerEvent){
            b.life = Math.max(b.life, P.phiLifeFloor);
            b.life = Math.min(1.0, b.life + P.phiLifeRecharge * (0.7 + 0.3*score));
          }

          // ARCHIVE STAMP: only once when it first locks
          if(!rec.seenLockedStamp){
            rec.seenLockedStamp = true;
            stampArchiveTrace(a, b, rec.phiScore);
          }
        }
      }

      return lockedNow;
    }

    function stampArchiveTrace(a, b, phiScore){
      const rgb = PALETTE[paletteIndex % PALETTE.length];
      paletteIndex++;

      // create a richer trace: sample a curved polyline between a and b
      const points = [];
      const steps = 28;
      const mp = bentMidpoint(a.x,a.y,b.x,b.y, 140*(0.35+0.65*phiScore));

      for(let i=0;i<=steps;i++){
        const u = i/steps;
        // quadratic Bezier interpolation
        const x = (1-u)*(1-u)*a.x + 2*(1-u)*u*mp.x + u*u*b.x;
        const y = (1-u)*(1-u)*a.y + 2*(1-u)*u*mp.y + u*u*b.y;
        points.push({x,y});
      }

      archive.push({
        points,
        ttl: P.archiveTTL_init,
        rgb,
        width: P.archiveWidth * (0.95 + 0.35*phiScore),
        alpha: P.archiveAlpha * (0.85 + 0.30*phiScore)
      });

      // cap archive size
      if(archive.length > P.archiveMax){
        archive.splice(0, archive.length - P.archiveMax);
      }
    }

    function drawArchive(){
      for(const tr of archive){
        const a = tr.alpha * tr.ttl;
        if(a <= 0.01) continue;

        ctx.beginPath();
        for(let i=0;i<tr.points.length;i++){
          const p=tr.points[i];
          if(i===0) ctx.moveTo(p.x,p.y);
          else ctx.lineTo(p.x,p.y);
        }
        ctx.strokeStyle = `rgba(${tr.rgb[0]},${tr.rgb[1]},${tr.rgb[2]},${Math.min(0.85,a)})`;
        ctx.lineWidth = tr.width;
        ctx.stroke();
      }
    }

    function stepArchive(){
      for(const tr of archive){
        tr.ttl = Math.max(0, tr.ttl - P.archiveTTL_decay);
      }
      archive = archive.filter(tr=>tr.ttl > 0.002);
    }

    function drawLinks(active){
      for(const e of active){
        const a=e.a, b=e.b;
        const baseW = lerp(P.widthFar, P.widthNear, e.near);
        const baseA = lerp(P.alphaFar, P.alphaNear, e.near);

        const rec = edgeMemory.get(e.key);
        const ps = rec ? rec.phiScore : e.phiScore;
        const locked = rec ? rec.locked === true : false;

        let width = baseW;
        let alpha = Math.min(0.90, baseA);

        const mp=bentMidpoint(a.x,a.y,b.x,b.y, 110*e.near*(1+0.35*ps));

        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.quadraticCurveTo(mp.x, mp.y, b.x, b.y);

        if(locked){
          ctx.strokeStyle = `rgba(255,215,120,${Math.min(0.98, alpha*1.55)})`;
          ctx.lineWidth = width * 2.2;
        } else if(ps >= P.phiGate){
          ctx.strokeStyle = `rgba(255,230,165,${Math.min(0.95, alpha*(1+0.6*ps))})`;
          ctx.lineWidth = width * (1.15 + 0.9*ps);
        } else {
          ctx.strokeStyle = `rgba(255,250,220,${alpha})`;
          ctx.lineWidth = width;
        }
        ctx.stroke();
      }
    }

    function stepEvents(){
      for(const e of events){
        e.life *= P.baseLifeDecay;
        e.phase += P.phaseSpeed;

        const drift = P.driftK * e.energy * e.life;
        e.vx += Math.cos(e.phase) * drift * 0.06;
        e.vy += Math.sin(e.phase*0.9) * drift * 0.06;

        e.x += e.vx;
        e.y += e.vy;

        e.vx *= 0.985;
        e.vy *= 0.985;

        if(e.x < 12){ e.x=12; e.vx *= -0.6; }
        if(e.y < 12){ e.y=12; e.vy *= -0.6; }
        if(e.x > w-12){ e.x=w-12; e.vx *= -0.6; }
        if(e.y > h-12){ e.y=h-12; e.vy *= -0.6; }
      }
      events = events.filter(e=>e.life > 0.03);
    }

    function drawEvents(){
      for(const e of events){
        ctx.beginPath();
        ctx.arc(e.x,e.y, e.radius*e.life*0.14, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,210,120,${0.16 + 0.34*e.life})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(e.x,e.y, 2.9 + 2.2*e.energy, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,245,210,${0.22 + 0.55*e.life})`;
        ctx.fill();

        if((e.lockCount||0) > 0){
          const a = Math.min(0.85, 0.22 + 0.18*(e.lockCount||0));
          ctx.beginPath();
          ctx.arc(e.x,e.y, 14 + 9*Math.min(4,(e.lockCount||0)), 0, Math.PI*2);
          ctx.strokeStyle = `rgba(255,215,120,${a})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }
    }

    function relinkAndPruneEdges(){
      const byId = new Map(events.map(e=>[e.id,e]));
      for(const [k,rec] of edgeMemory.entries()){
        const [aId,bId]=k.split("-").map(Number);
        const a=byId.get(aId), b=byId.get(bId);
        if(a && b){ rec.a=a; rec.b=b; }
        else edgeMemory.delete(k);
      }
    }

    function render(){
      frame++;

      drawGradientBackground();
      drawPulsingField();

      const active = buildActiveEdges();
      updateEdgeMemory(active);

      // Archive is the long-lived layer: draw first so new lines sit above it
      stepArchive();
      drawArchive();

      const lockedNow = applyPhiConvergenceAndLock(active);

      // Draw current dynamics on top
      drawLinks(active);
      stepEvents();
      drawEvents();
      relinkAndPruneEdges();

      hud.innerHTML =
        `events: ${events.length}<br>` +
        `links: ${active.length}<br>` +
        `phiLockedNow: ${lockedNow}<br>` +
        `archive: ${archive.length}`;

      t += 0.01;
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
