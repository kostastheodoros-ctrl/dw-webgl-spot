<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>DW / Design as Event — BUILD 2026-03-05T00:00:00Z-a7f3c9</title>

  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: radial-gradient(1200px 800px at 20% 15%, #141827 0%, #070A10 55%, #04050A 100%);
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    #c { display:block; width:100vw; height:100vh; }
    /* Visible proof overlay (must be unmistakable) */
    #hud {
      position: fixed; left: 12px; top: 10px; z-index: 10;
      padding: 10px 12px;
      background: rgba(10,12,18,0.62);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.92);
      line-height: 1.25;
      user-select: none;
      pointer-events: none;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }
    #hud b { color: #FFD36E; font-weight: 700; }
    #hud .tiny { font-size: 12px; opacity: 0.88; }
    #hud .dot {
      display:inline-block; width:8px; height:8px; border-radius:999px;
      margin-right:8px; transform: translateY(-1px);
      background:#26ff7a; box-shadow:0 0 16px rgba(38,255,122,0.65);
    }

    /* Optional visible link (to rule out “links not visible”) */
    #linkbar {
      position: fixed; right: 12px; top: 10px; z-index: 10;
      display: flex; gap: 10px;
      padding: 10px 12px;
      background: rgba(10,12,18,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #linkbar a {
      color: #CFE8FF; text-decoration: none; font-size: 13px; font-weight: 600;
      padding: 6px 8px; border-radius: 10px;
      border: 1px solid rgba(207,232,255,0.22);
      background: rgba(8,10,16,0.35);
    }
    #linkbar a:hover { background: rgba(207,232,255,0.10); }
  </style>
</head>

<body>
  <div id="hud">
    <div><span class="dot"></span><b>BUILD ID</b></div>
    <div class="tiny" id="buildLine">2026-03-05T00:00:00Z-a7f3c9</div>
    <div class="tiny" id="urlLine"></div>
  </div>

  <div id="linkbar">
    <a href="https://kostastheodoros-ctrl.github.io/dw-webgl-spot/" target="_blank" rel="noreferrer">LIVE</a>
    <a href="https://github.com/kostastheodoros-ctrl/dw-webgl-spot" target="_blank" rel="noreferrer">REPO</a>
  </div>

  <canvas id="c"></canvas>

  <script>
    /* ===== BUILD STAMP (verifiable) ===== */
    const BUILD_ID = "2026-03-05T00:00:00Z-a7f3c9";
    document.getElementById("buildLine").textContent = BUILD_ID;
    document.getElementById("urlLine").textContent = location.href;

    console.log("[DW] BUILD_ID =", BUILD_ID);

    /* ===== Service Worker purge (common reason “I don’t see changes”) ===== */
    (async () => {
      if (!("serviceWorker" in navigator)) return;
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        if (regs && regs.length) {
          for (const r of regs) await r.unregister();
          console.warn("[DW] Service workers unregistered:", regs.length);
        }
      } catch (e) {
        console.warn("[DW] SW purge error:", e);
      }
    })();

    /* ===== Minimal visible runtime change (canvas rendering must prove deploy) ===== */
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = "100vw";
      canvas.style.height = "100vh";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resize, { passive: true });
    resize();

    // A subtle but unmistakable animated mark + Build text drawn ON the canvas
    let t0 = performance.now();

    function frame(now) {
      const t = (now - t0) * 0.001;
      const w = window.innerWidth, h = window.innerHeight;

      // Background (not full black)
      ctx.fillStyle = "#070A10";
      ctx.fillRect(0, 0, w, h);

      // Animated “proof” ribbon
      const cx = w * 0.5, cy = h * 0.55;
      const r = Math.min(w, h) * (0.22 + 0.02 * Math.sin(t));
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= 360; i += 6) {
        const a = (i * Math.PI) / 180;
        const wobble = 1 + 0.06 * Math.sin(3*a + t*1.3) + 0.03 * Math.sin(7*a - t*0.9);
        const x = cx + Math.cos(a) * r * wobble;
        const y = cy + Math.sin(a) * r * wobble;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = "rgba(255,211,110,0.92)"; // “gold proof”
      ctx.stroke();

      // Canvas-stamped build text (this is the real verification)
      ctx.font = "600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.fillText("DW / Design as Event", 14, h - 44);
      ctx.fillStyle = "rgba(255,211,110,0.92)";
      ctx.fillText("BUILD " + BUILD_ID, 14, h - 24);

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
