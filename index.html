<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Design as Event — Morphogenetic Field</title>
  <style>
    html,body{margin:0;height:100%;background:#04060a;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#eaf2ff;}
    canvas{display:block;}
    .ui{
      position:fixed;top:14px;left:14px;max-width:520px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
    }
    .ui b{letter-spacing:.2px;}
    .hud{
      position:fixed;top:14px;right:14px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
      min-width:150px;text-align:right;
    }
  </style>
</head>

<body>
  <div class="ui">
    <b>DESIGN AS EVENT — MORPHOGENETIC FIELD</b><br>
    Click → event birth<br>
    Lines → immediate relational links (high visibility)<br>
    Trails → persistent sequences (edge-memory)
  </div>
  <div class="hud" id="hud">events: 0<br>links: 0</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");

    let w=0,h=0;
    function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
    addEventListener("resize", resize);
    resize();

    let t=0, frame=0;
    let nextId=1;

    let events = [];
    let edgeMemory = new Map(); // key -> {a,b,strength,ttl,trail,trailAge}

    const P = {
      // event birth
      energyMin: 0.8,
      energyMax: 1.8,
      radiusBase: 90,
      radiusK: 185,
      lifeBase: 1.0,
      lifeK: 0.55,
      phaseSpeed: 0.015,

      // LINKING (make it obvious)
      edgeMaxD_factor: 0.95,     // MUCH larger: links form easily
      edgeCharge: 0.10,
      edgeDecay: 0.0022,         // slow decay => lines persist
      edgeTTL_gain: 3.2,
      edgeTTL_decay: 0.0030,

      // VISUALS (bright + thick)
      edgeAlphaBase: 0.18,
      edgeAlphaK: 0.70,
      edgeWidthBase: 1.2,
      edgeWidthK: 3.2,

      // trails (persistent sequences)
      trailMaxPoints: 60,
      trailSampleEvery: 2,
      trailFade: 0.010,
      trailCurviness: 0.22,

      // background fade (keep depth)
      bgFade: 0.14
    };

    addEventListener("click",(e)=>createEvent(e.clientX,e.clientY));

    function createEvent(x,y){
      const energy = P.energyMin + Math.random()*(P.energyMax-P.energyMin);
      const radius = P.radiusBase + P.radiusK*energy;
      const lifetime = Math.min(1.0, P.lifeBase + P.lifeK*energy);

      events.push({
        id: nextId++,
        x,y,
        energy,
        radius,
        life: lifetime,
        phase: Math.random()*Math.PI*2
      });
    }

    function bentMidpoint(ax,ay,bx,by,amount){
      const mx=(ax+bx)/2, my=(ay+by)/2;
      const dx=bx-ax, dy=by-ay;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len, ny=dx/len;
      const wobble=Math.sin(t*1.1 + (ax+ay+bx+by)*0.003) * amount;
      return { x: mx + nx*wobble, y: my + ny*wobble };
    }

    function buildActiveEdges(){
      const active = [];
      for(let i=0;i<events.length;i++){
        for(let j=i+1;j<events.length;j++){
          const a=events[i], b=events[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          const maxD=(a.radius+b.radius)*P.edgeMaxD_factor;
          if(d < maxD){
            const closeness = 1 - (d / Math.max(1,maxD));
            const charge = closeness * (0.5 + 0.5*Math.min(a.life,b.life));
            const minId=Math.min(a.id,b.id), maxId=Math.max(a.id,b.id);
            const key=`${minId}-${maxId}`;
            active.push({key,a,b,charge});
          }
        }
      }
      return active;
    }

    function updateEdgeMemory(active){
      frame++;

      // decay existing
      for(const [k,rec] of edgeMemory.entries()){
        rec.strength = Math.max(0, rec.strength - P.edgeDecay);
        rec.ttl = Math.max(0, rec.ttl - P.edgeTTL_decay);

        // fade trail points
        for(let i=0;i<rec.trailAge.length;i++){
          rec.trailAge[i] = Math.max(0, rec.trailAge[i] - P.trailFade);
        }
        while(rec.trailAge.length && rec.trailAge[0] <= 0.001){
          rec.trailAge.shift();
          rec.trail.shift();
        }

        if((rec.strength <= 0.001 || rec.ttl <= 0.001) && rec.trail.length === 0){
          edgeMemory.delete(k);
        }
      }

      // charge active + sample trail
      for(const e of active){
        const rec = edgeMemory.get(e.key) || { a:e.a, b:e.b, strength:0, ttl:0, trail:[], trailAge:[] };
        rec.a=e.a; rec.b=e.b;
        rec.strength = Math.min(1.0, rec.strength + P.edgeCharge*e.charge);
        rec.ttl = Math.min(1.0, rec.ttl + P.edgeTTL_gain*0.01*e.charge);

        if(frame % P.trailSampleEvery === 0){
          const mp=bentMidpoint(e.a.x,e.a.y,e.b.x,e.b.y, P.trailCurviness*140*e.charge);
          rec.trail.push(mp);
          rec.trailAge.push(1.0);
          while(rec.trail.length > P.trailMaxPoints){
            rec.trail.shift(); rec.trailAge.shift();
          }
        }

        edgeMemory.set(e.key, rec);
      }
    }

    function drawTrails(){
      for(const rec of edgeMemory.values()){
        if(rec.trail.length < 2) continue;
        const avgAge = rec.trailAge.reduce((s,a)=>s+a,0)/Math.max(1,rec.trailAge.length);
        const s = rec.strength * (0.35 + 0.65*rec.ttl);
        const alpha = Math.min(0.55, 0.10 + 0.45*avgAge*s);
        const width = 1.0 + 2.6*avgAge*s;

        ctx.beginPath();
        for(let i=0;i<rec.trail.length;i++){
          const p=rec.trail[i];
          if(i===0) ctx.moveTo(p.x,p.y);
          else ctx.lineTo(p.x,p.y);
        }
        ctx.strokeStyle = `rgba(255,235,190,${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();
      }
    }

    function drawImmediateLinks(active){
      // These are the “lines that connect the clicks” (guaranteed visible)
      for(const e of active){
        const a=e.a, b=e.b;
        const base = Math.min(1.0, 0.35 + 0.65*e.charge);
        const alpha = Math.min(0.85, P.edgeAlphaBase + base*P.edgeAlphaK);
        const width = P.edgeWidthBase + base*P.edgeWidthK;

        const mp=bentMidpoint(a.x,a.y,b.x,b.y, 90*e.charge);

        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.quadraticCurveTo(mp.x, mp.y, b.x, b.y);
        ctx.strokeStyle = `rgba(255,250,220,${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();
      }
    }

    function drawEvents(){
      for(const e of events){
        e.phase += P.phaseSpeed;
        e.life *= 0.987; // slow decay so links have time to form

        // micro drift
        const drift = 0.08*e.energy*e.life;
        e.x += Math.cos(e.phase)*drift;
        e.y += Math.sin(e.phase*0.9)*drift;

        e.x = Math.max(10, Math.min(w-10, e.x));
        e.y = Math.max(10, Math.min(h-10, e.y));

        // halo
        ctx.beginPath();
        ctx.arc(e.x,e.y, e.radius*e.life*0.18, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,210,120,${0.18 + 0.30*e.life})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // dot
        ctx.beginPath();
        ctx.arc(e.x,e.y, 2.4 + 2.0*e.energy, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,245,210,${0.25 + 0.45*e.life})`;
        ctx.fill();
      }
      events = events.filter(e=>e.life > 0.05);
    }

    function relinkEdgeRefs(){
      const byId = new Map(events.map(e=>[e.id,e]));
      for(const [k,rec] of edgeMemory.entries()){
        const [aId,bId]=k.split("-").map(Number);
        const a=byId.get(aId), b=byId.get(bId);
        if(a && b){ rec.a=a; rec.b=b; }
        else { rec.a=a||null; rec.b=b||null; }
      }
    }

    function render(){
      // background persistence
      ctx.fillStyle = `rgba(4,6,10,${P.bgFade})`;
      ctx.fillRect(0,0,w,h);

      const active = buildActiveEdges();
      updateEdgeMemory(active);

      // DEPTH: trails, then current links
      drawTrails();
      drawImmediateLinks(active);

      drawEvents();
      relinkEdgeRefs();

      hud.innerHTML = `events: ${events.length}<br>links: ${active.length}`;

      t += 0.01;
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
