<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Design as Event — Morphogenetic Field</title>

<style>
html,body{
margin:0;
height:100%;
background:#04060a;
overflow:hidden;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:white;
}

canvas{
display:block;
}

.ui{
position:fixed;
top:14px;
left:14px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(6px);
padding:10px 14px;
border-radius:12px;
font-size:13px;
line-height:1.45;
}

.embed .ui{
display:none;
}
</style>
</head>

<body>

<div class="ui">
<b>DESIGN AS EVENT — FIELD</b><br>
Move: field deformation<br>
Click: event topology
</div>

<canvas id="c"></canvas>

<script>

const params = new URLSearchParams(location.search)
if(params.get("embed")=="1") document.body.classList.add("embed")

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

let w,h

function resize(){
w = canvas.width = innerWidth
h = canvas.height = innerHeight
}
resize()
addEventListener("resize",resize)

let mouse = {x:w/2,y:h/2}

addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

let events=[]

addEventListener("click",e=>{
createEvent(e.clientX,e.clientY)
})

function createEvent(x,y){

const pts=[]
const n = 8 + Math.random()*10
const radius = 60 + Math.random()*90

for(let i=0;i<n;i++){

const a = Math.random()*Math.PI*2
const r = radius*(0.6+Math.random()*0.5)

pts.push({
x:x+r*Math.cos(a),
y:y+r*Math.sin(a)
})

}

events.push({
x,y,
points:pts,
life:1,
shock:0
})

}

let t=0

function render(){

ctx.fillStyle="rgba(4,6,10,.25)"
ctx.fillRect(0,0,w,h)

drawField()

drawEvents()

t+=0.01

requestAnimationFrame(render)

}

function drawField(){

const rings = 26
const cx = w/2
const cy = h/2

for(let r=0;r<rings;r++){

const radius = 70 + r*14

ctx.beginPath()

for(let i=0;i<160;i++){

const a = i/160*Math.PI*2

let x = cx + radius*Math.cos(a)
let y = cy + radius*Math.sin(a)

const dx = (mouse.x-cx)/cx
const dy = (mouse.y-cy)/cy

x += dx*radius*0.25
y += dy*radius*0.25

x += Math.sin(a*3+t+r*0.12)*radius*0.08
y += Math.cos(a*4+t+r*0.12)*radius*0.08

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

ctx.closePath()

ctx.strokeStyle="rgba(140,210,255,"+(0.15+r/rings*0.35)+")"
ctx.lineWidth=1

ctx.stroke()

}

}

function drawEvents(){

events.forEach(e=>{

e.life*=0.985
e.shock+=0.03

const alpha = e.life

ctx.strokeStyle="rgba(255,210,120,"+alpha+")"
ctx.fillStyle="rgba(255,210,120,"+alpha+")"

ctx.lineWidth=1.4

// constellation nodes
e.points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fill()
})

// edges
for(let i=0;i<e.points.length-1;i++){

const p1=e.points[i]
const p2=e.points[i+1]

ctx.beginPath()
ctx.moveTo(p1.x,p1.y)
ctx.lineTo(p2.x,p2.y)
ctx.stroke()

}

// shockwave
const r = e.shock*120

ctx.beginPath()
ctx.arc(e.x,e.y,r,0,Math.PI*2)
ctx.strokeStyle="rgba(255,210,120,"+(alpha*0.4)+")"
ctx.lineWidth=1
ctx.stroke()

})

events = events.filter(e=>e.life>0.05)

}

render()

</script>

</body>
</html>
