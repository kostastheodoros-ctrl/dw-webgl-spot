<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Design as Event — Morphogenetic Field</title>
  <style>
    html,body{margin:0;height:100%;background:#04060a;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#eaf2ff;}
    canvas{display:block;}
    .ui{
      position:fixed;top:14px;left:14px;max-width:520px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
    }
    .ui b{letter-spacing:.2px;}
  </style>
</head>

<body>
  <div class="ui">
    <b>DESIGN AS EVENT — MORPHOGENETIC FIELD</b><br>
    Click → event birth (energy / radius / lifetime / phase)<br>
    Meaning → relations persist as <b>edge-trails</b> (temporal sequences)<br>
    Form → polygon appears only from metastable clusters (≥3 + stability)
  </div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    let w=0,h=0;
    function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
    addEventListener("resize", resize);
    resize();

    let t = 0;
    let mouse = { x: innerWidth/2, y: innerHeight/2 };
    addEventListener("mousemove",(e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

    let nextId = 1;
    let events = [];
    let shockwaves = [];

    // Cluster stability memory: signature -> frames/stable
    const clusterMemory = new Map();
    const STABILITY_FRAMES = 90;

    // Edge-memory with trails:
    // key "minId-maxId" -> { strength, ttl, a, b, trail:[{x,y}], trailAge:[0..1] }
    const edgeMemory = new Map();

    const P = {
      // birth
      energyMin: 0.55,
      energyMax: 1.60,
      radiusBase: 78,
      radiusK: 165,
      lifeBase: 0.95,
      lifeK: 0.45,
      phaseSpeed: 0.015,

      // field
      attractorSoftening: 2800,
      attractorGain: 1.0,
      attractorLocalGain: 0.23,
      mouseGain: 0.14,

      // interaction
      interactLinkScale: 0.55,
      fusionThreshold: 0.28,
      annihThreshold: 0.95,
      dampFactor: 0.86,

      // context field rings
      rings: 22,
      ringPoints: 150,
      ringSpacing: 16,
      ringStart: 60,

      // EDGE ACTIVATION
      edgeMaxD_factor: 0.60,      // slightly more permissive -> more “sequences”
      edgeCharge: 0.075,          // charging speed when active
      edgeStrengthMax: 1.0,

      // PERSISTENCE (make lines live longer)
      edgeDecay: 0.0036,          // slower strength decay (was ~0.0065)
      edgeTTL_gain: 2.6,          // more TTL added when active
      edgeTTL_decay: 0.0048,      // much slower TTL decay
      ttlMax: 1.0,

      // TRIAD / MOTIF BOOST
      triadBoost: 0.28,           // stronger motif reinforcement

      // DRAWING
      edgeWidthBase: 0.55,
      edgeWidthK: 2.6,
      edgeAlphaBase: 0.06,
      edgeAlphaK: 0.52,

      // TRAILS (this is the “depth”)
      trailMaxPoints: 44,         // how long the trail polyline can get
      trailSampleEvery: 2,        // frames between samples
      trailFade: 0.014,           // fade speed of old trail points (lower = more persistence)
      trailCurviness: 0.18        // how “organic” the trail bends
    };

    addEventListener("click",(e)=>createEvent(e.clientX,e.clientY));

    function createEvent(x,y){
      const energy = P.energyMin + Math.random()*(P.energyMax-P.energyMin);
      const radius = P.radiusBase + P.radiusK*energy;
      const lifetime = Math.min(1.0, P.lifeBase + P.lifeK*energy);

      events.push({
        id: nextId++,
        x,y,
        energy,
        radius,
        life: lifetime,
        age: 0,
        phase: Math.random()*Math.PI*2
      });
    }

    function spawnShockwave(x,y,amp=1.0,speed=0.8){
      shockwaves.push({ x,y, r:6, amp, speed, life:1.0 });
    }

    function attractorVectorAt(px,py){
      let vx=0, vy=0;
      for(const e of events){
        const dx = e.x - px;
        const dy = e.y - py;
        const d2 = dx*dx + dy*dy + P.attractorSoftening;
        const d = Math.sqrt(d2);
        const strength = (e.energy * e.life) / d2;
        vx += (dx/d) * strength;
        vy += (dy/d) * strength;
      }
      return { vx, vy };
    }

    function interactEvents(){
      for(let i=0;i<events.length;i++){
        for(let j=i+1;j<events.length;j++){
          const a=events[i], b=events[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);

          const interactDistance = (a.radius + b.radius) * P.interactLinkScale;
          if(d < interactDistance){
            const de = Math.abs(a.energy - b.energy);

            if(de < P.fusionThreshold){
              a.energy = a.energy + b.energy*0.6;
              a.radius = a.radius + 18 + b.energy*10;
              a.life = Math.min(1.0, a.life + 0.12);
              a.phase = (a.phase + b.phase)*0.5;
              spawnShockwave((a.x+b.x)/2,(a.y+b.y)/2, 1.0, 0.55);
              b.life = 0;
            } else if(de > P.annihThreshold){
              spawnShockwave((a.x+b.x)/2,(a.y+b.y)/2, 1.6 + de*0.4, 1.05);
              a.life = 0; b.life = 0;
            } else {
              a.life *= P.dampFactor;
              b.life *= P.dampFactor;
            }
          }
        }
      }
    }

    function computeClusters(){
      const n = events.length;
      const adj = Array.from({length:n},()=>[]);
      for(let i=0;i<n;i++){
        for(let j=i+1;j<n;j++){
          const a=events[i], b=events[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          const linkDist = (a.radius + b.radius) * (P.interactLinkScale*0.92);
          if(d < linkDist){
            adj[i].push(j); adj[j].push(i);
          }
        }
      }

      const seen = new Array(n).fill(false);
      const comps = [];
      for(let i=0;i<n;i++){
        if(seen[i]) continue;
        const stack=[i]; seen[i]=true;
        const idx=[];
        while(stack.length){
          const u=stack.pop();
          idx.push(u);
          for(const v of adj[u]){
            if(!seen[v]){ seen[v]=true; stack.push(v); }
          }
        }
        if(idx.length >= 3){
          const ids = idx.map(k=>events[k].id).sort((a,b)=>a-b);
          const key = ids.join("-");
          comps.push({ key, idx });
        }
      }

      const seenNow = new Set(comps.map(c=>c.key));
      for(const c of comps){
        const rec = clusterMemory.get(c.key) || {frames:0, stable:false};
        rec.frames += 1;
        if(rec.frames >= STABILITY_FRAMES) rec.stable = true;
        clusterMemory.set(c.key, rec);
      }
      for(const [key,rec] of clusterMemory.entries()){
        if(!seenNow.has(key)){
          rec.frames = Math.max(0, rec.frames - 2);
          if(rec.frames < STABILITY_FRAMES*0.65) rec.stable = false;
          if(rec.frames === 0) clusterMemory.delete(key);
        }
      }

      return comps.map(c=>({ ...c, stable: clusterMemory.get(c.key)?.stable === true }));
    }

    function convexHull(points){
      if(points.length <= 2) return points.slice();
      const pts = points.slice().sort((p,q)=>(p.x-q.x)||(p.y-q.y));
      const cross=(o,a,b)=> (a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);
      const lower=[];
      for(const p of pts){
        while(lower.length>=2 && cross(lower[lower.length-2],lower[lower.length-1],p)<=0) lower.pop();
        lower.push(p);
      }
      const upper=[];
      for(let i=pts.length-1;i>=0;i--){
        const p=pts[i];
        while(upper.length>=2 && cross(upper[upper.length-2],upper[upper.length-1],p)<=0) upper.pop();
        upper.push(p);
      }
      upper.pop(); lower.pop();
      return lower.concat(upper);
    }

    function drawField(){
      const cx=w/2, cy=h/2;
      for(let r=0;r<P.rings;r++){
        const baseRadius = P.ringStart + r*P.ringSpacing;
        ctx.beginPath();
        for(let i=0;i<P.ringPoints;i++){
          const a=(i/P.ringPoints)*Math.PI*2;
          let x=cx + baseRadius*Math.cos(a);
          let y=cy + baseRadius*Math.sin(a);

          const mdx = (mouse.x - cx)/Math.max(1,cx);
          const mdy = (mouse.y - cy)/Math.max(1,cy);
          x += mdx*baseRadius*P.mouseGain;
          y += mdy*baseRadius*P.mouseGain;

          x += Math.sin(a*3 + t + r*0.12)*baseRadius*0.07;
          y += Math.cos(a*4 + t + r*0.12)*baseRadius*0.07;

          const fv=attractorVectorAt(x,y);
          x += fv.vx * baseRadius * P.attractorGain * P.attractorLocalGain;
          y += fv.vy * baseRadius * P.attractorGain * P.attractorLocalGain;

          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath();
        const alpha=0.10+(r/P.rings)*0.24;
        ctx.strokeStyle=`rgba(140,210,255,${alpha})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }

    function buildActiveEdgesAndTriads(){
      const activeEdges = [];
      const neigh = new Map(); // id -> Set(neighbors)

      for(let i=0;i<events.length;i++){
        for(let j=i+1;j<events.length;j++){
          const a=events[i], b=events[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);

          const maxD = (a.radius + b.radius) * P.edgeMaxD_factor;
          if(d < maxD){
            const closeness = 1 - (d / Math.max(1,maxD));
            const charge = closeness * (0.5 + 0.5*Math.min(a.life,b.life));

            const minId = Math.min(a.id,b.id);
            const maxId = Math.max(a.id,b.id);
            const key = `${minId}-${maxId}`;

            activeEdges.push({ key, a, b, charge });

            if(!neigh.has(a.id)) neigh.set(a.id, new Set());
            if(!neigh.has(b.id)) neigh.set(b.id, new Set());
            neigh.get(a.id).add(b.id);
            neigh.get(b.id).add(a.id);
          }
        }
      }

      const triadPairs = new Set();
      for(const [id, ns] of neigh.entries()){
        const arr = Array.from(ns);
        for(let i=0;i<arr.length;i++){
          for(let j=i+1;j<arr.length;j++){
            const b = arr[i], c = arr[j];
            if(neigh.get(b)?.has(c)){
              triadPairs.add(`${Math.min(id,b)}-${Math.max(id,b)}`);
              triadPairs.add(`${Math.min(id,c)}-${Math.max(id,c)}`);
              triadPairs.add(`${Math.min(b,c)}-${Math.max(b,c)}`);
            }
          }
        }
      }

      return { activeEdges, triadPairs };
    }

    // helper for organic bend: a midpoint displaced perpendicular to the segment
    function bentMidpoint(ax,ay,bx,by,amount){
      const mx = (ax+bx)/2;
      const my = (ay+by)/2;
      const dx = bx-ax;
      const dy = by-ay;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      const nx = -dy/len;
      const ny = dx/len;
      const wobble = Math.sin(t*1.2 + (ax+ay+bx+by)*0.003) * amount;
      return { x: mx + nx*wobble, y: my + ny*wobble };
    }

    let frameCount = 0;

    function updateEdgeMemory(activeEdges, triadPairs){
      frameCount++;

      // decay (very slow) so relations persist and build depth
      for(const [k, rec] of edgeMemory.entries()){
        rec.strength = Math.max(0, rec.strength - P.edgeDecay);
        rec.ttl = Math.max(0, rec.ttl - P.edgeTTL_decay);

        // fade trail points
        for(let i=0;i<rec.trailAge.length;i++){
          rec.trailAge[i] = Math.max(0, rec.trailAge[i] - P.trailFade);
        }
        // drop very old points
        while(rec.trailAge.length && rec.trailAge[0] <= 0.001){
          rec.trailAge.shift();
          rec.trail.shift();
        }

        if((rec.strength <= 0.001 || rec.ttl <= 0.001) && rec.trail.length === 0){
          edgeMemory.delete(k);
        }
      }

      // charge active edges + record trail samples
      for(const e of activeEdges){
        const key = e.key;
        const prev = edgeMemory.get(key) || {
          strength: 0, ttl: 0,
          a: e.a, b: e.b,
          trail: [],
          trailAge: []
        };

        prev.a = e.a;
        prev.b = e.b;

        prev.strength = Math.min(P.edgeStrengthMax, prev.strength + P.edgeCharge * e.charge);
        prev.ttl = Math.min(P.ttlMax, prev.ttl + (P.edgeTTL_gain * 0.01 * e.charge));

        // sample trail every N frames to form “sequences”
        if(frameCount % P.trailSampleEvery === 0){
          const mp = bentMidpoint(e.a.x,e.a.y,e.b.x,e.b.y, P.trailCurviness * 120 * e.charge);
          prev.trail.push(mp);
          prev.trailAge.push(1.0);

          // keep max length
          while(prev.trail.length > P.trailMaxPoints){
            prev.trail.shift();
            prev.trailAge.shift();
          }
        }

        edgeMemory.set(key, prev);
      }

      // triad reinforcement: motifs persist longer and look “solid”
      for(const key of triadPairs){
        const rec = edgeMemory.get(key);
        if(rec){
          rec.strength = Math.min(P.edgeStrengthMax, rec.strength + P.triadBoost * 0.01);
          rec.ttl = Math.min(P.ttlMax, rec.ttl + 0.012);
        }
      }
    }

    function drawEdgeTrailsAndEdges(){
      // trails first (depth layer)
      for(const rec of edgeMemory.values()){
        if(rec.trail.length >= 2){
          ctx.beginPath();
          for(let i=0;i<rec.trail.length;i++){
            const p = rec.trail[i];
            if(i===0) ctx.moveTo(p.x,p.y);
            else ctx.lineTo(p.x,p.y);
          }
          // trail opacity depends on average age and strength
          const avgAge = rec.trailAge.reduce((s,a)=>s+a,0) / Math.max(1, rec.trailAge.length);
          const s = rec.strength * (0.35 + 0.65*rec.ttl);
          const alpha = Math.min(0.40, 0.06 + 0.34 * avgAge * s);
          const width = 0.8 + 2.2 * avgAge * s;
          ctx.strokeStyle = `rgba(255,235,190,${alpha})`;
          ctx.lineWidth = width;
          ctx.stroke();
        }
      }

      // then the current edge (surface layer)
      for(const rec of edgeMemory.values()){
        const a = rec.a, b = rec.b;
        if(!a || !b) continue;

        const s = rec.strength * (0.25 + rec.ttl);
        const alpha = Math.min(0.62, P.edgeAlphaBase + s * P.edgeAlphaK);
        const width = P.edgeWidthBase + s * P.edgeWidthK;

        // gentle curve instead of dead-straight
        const mp = bentMidpoint(a.x,a.y,b.x,b.y, 60 * rec.strength);

        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.quadraticCurveTo(mp.x, mp.y, b.x, b.y);
        ctx.strokeStyle = `rgba(255,245,210,${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();
      }
    }

    function drawEmergence(components){
      for(const comp of components){
        if(!comp.stable) continue;

        const pts = comp.idx.map(k=>({x:events[k].x,y:events[k].y}));
        const hull = convexHull(pts);
        if(hull.length < 3) continue;

        const cx = hull.reduce((s,p)=>s+p.x,0)/hull.length;
        const cy = hull.reduce((s,p)=>s+p.y,0)/hull.length;

        ctx.beginPath();
        for(let i=0;i<hull.length;i++){
          const p=hull[i];
          const dx=p.x-cx, dy=p.y-cy;
          const mag=Math.sqrt(dx*dx+dy*dy)||1;
          const expand = 12 + 12*Math.sin(t*1.05 + i*0.7);
          const x=p.x + (dx/mag)*expand;
          const y=p.y + (dy/mag)*expand;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath();

        // only allowed polygon: emergent metastable contour
        ctx.fillStyle="rgba(120,210,255,0.045)";
        ctx.fill();
        ctx.strokeStyle="rgba(120,210,255,0.30)";
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }

    function drawShockwaves(){
      for(const s of shockwaves){
        s.r += 5.5*s.speed;
        s.life *= 0.965;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(255,170,120,${s.life*0.55*s.amp})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
      shockwaves = shockwaves.filter(s=>s.life>0.05);
    }

    function drawEvents(){
      for(const e of events){
        e.age += 1;
        e.phase += P.phaseSpeed;
        e.life *= 0.984; // slower decay -> more time for sequences

        const drift = 0.10*e.energy*e.life;
        e.x += Math.cos(e.phase)*drift;
        e.y += Math.sin(e.phase*0.9)*drift;

        e.x = Math.max(10, Math.min(w-10, e.x));
        e.y = Math.max(10, Math.min(h-10, e.y));

        ctx.beginPath();
        ctx.arc(e.x,e.y, e.radius*e.life*0.21, 0, Math.PI*2);
        ctx.strokeStyle=`rgba(255,210,120,${0.14 + e.life*0.34})`;
        ctx.lineWidth=1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(e.x,e.y, 2.2 + e.energy*1.8, 0, Math.PI*2);
        ctx.fillStyle=`rgba(255,245,210,${0.20 + e.life*0.44})`;
        ctx.fill();
      }

      events = events.filter(e=>e.life>0.045);
    }

    function relinkEdgeRefsAfterCulling(){
      const byId = new Map(events.map(e=>[e.id,e]));
      for(const [k, rec] of edgeMemory.entries()){
        const ids = k.split("-").map(Number);
        const a = byId.get(ids[0]);
        const b = byId.get(ids[1]);
        if(a && b){ rec.a = a; rec.b = b; }
        else { rec.a = a || null; rec.b = b || null; }
      }
    }

    function render(){
      // temporal trace (keep depth)
      ctx.fillStyle="rgba(4,6,10,0.18)";
      ctx.fillRect(0,0,w,h);

      drawField();
      interactEvents();

      const { activeEdges, triadPairs } = buildActiveEdgesAndTriads();
      updateEdgeMemory(activeEdges, triadPairs);
      drawEdgeTrailsAndEdges();

      const comps = computeClusters();
      drawEmergence(comps);

      drawShockwaves();
      drawEvents();
      relinkEdgeRefsAfterCulling();

      t += 0.01;
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
