<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Design as Event — Morphogenetic Field</title>
  <style>
    html,body{margin:0;height:100%;background:#04060a;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#eaf2ff;}
    canvas{display:block;}
    .ui{
      position:fixed;top:14px;left:14px;max-width:560px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
    }
    .ui b{letter-spacing:.2px;}
    .hud{
      position:fixed;top:14px;right:14px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
      min-width:160px;text-align:right;
    }
  </style>
</head>

<body>
  <div class="ui">
    <b>DESIGN AS EVENT — MORPHOGENETIC FIELD</b><br>
    Click → event birth<br>
    Background → pulsing ring-field (context topology)<br>
    Lines → depth perspective (distance-weighted) + long-lived edge-memory trails
  </div>
  <div class="hud" id="hud">events: 0<br>links: 0</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");

    let w=0,h=0;
    function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
    addEventListener("resize", resize);
    resize();

    let t=0, frame=0;
    let nextId=1;

    let mouse = { x: innerWidth/2, y: innerHeight/2 };
    addEventListener("mousemove",(e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

    let events = [];
    // key -> {a,b,strength,ttl,trail,trailAge}
    let edgeMemory = new Map();

    const P = {
      // event birth
      energyMin: 0.8,
      energyMax: 1.85,
      radiusBase: 90,
      radiusK: 190,
      lifeBase: 1.0,
      lifeK: 0.62,
      phaseSpeed: 0.015,

      // pulsing ring-field (the “background” you want)
      rings: 24,
      ringPoints: 170,
      ringSpacing: 15,
      ringStart: 58,
      mouseGain: 0.12,           // subtle baseline drift
      pulseA: 0.075,             // breathing amplitude

      // LINKING: easier to connect, but depth-weighted
      edgeMaxD_factor: 0.95,

      // MEMORY: persist MUCH longer
      edgeCharge: 0.095,
      edgeDecay: 0.0015,         // very slow strength decay
      edgeTTL_gain: 3.6,
      edgeTTL_decay: 0.0018,     // very slow TTL decay

      // DRAW perspective (near vs far)
      widthNear: 4.2,
      widthFar: 0.8,
      alphaNear: 0.92,
      alphaFar: 0.10,

      // trails
      trailMaxPoints: 80,
      trailSampleEvery: 2,
      trailFade: 0.006,          // slower trail fade (more persistence)
      trailCurviness: 0.24,

      // background fade (keep traces longer)
      bgFade: 0.09
    };

    addEventListener("click",(e)=>createEvent(e.clientX,e.clientY));

    function createEvent(x,y){
      const energy = P.energyMin + Math.random()*(P.energyMax-P.energyMin);
      const radius = P.radiusBase + P.radiusK*energy;
      const lifetime = Math.min(1.0, P.lifeBase + P.lifeK*energy);

      events.push({
        id: nextId++,
        x,y,
        energy,
        radius,
        life: lifetime,
        phase: Math.random()*Math.PI*2
      });
    }

    function bentMidpoint(ax,ay,bx,by,amount){
      const mx=(ax+bx)/2, my=(ay+by)/2;
      const dx=bx-ax, dy=by-ay;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len, ny=dx/len;
      const wobble=Math.sin(t*1.1 + (ax+ay+bx+by)*0.003) * amount;
      return { x: mx + nx*wobble, y: my + ny*wobble };
    }

    // Depth weight: 0 (far) .. 1 (near)
    function depthWeight(d, maxD){
      const x = 1 - (d / Math.max(1,maxD));
      // make near relations pop more (nonlinear)
      return Math.max(0, Math.min(1, x*x));
    }

    function drawPulsingField(){
      const cx=w/2, cy=h/2;
      for(let r=0;r<P.rings;r++){
        const baseRadius = P.ringStart + r*P.ringSpacing;
        ctx.beginPath();
        for(let i=0;i<P.ringPoints;i++){
          const a=(i/P.ringPoints)*Math.PI*2;
          let x=cx + baseRadius*Math.cos(a);
          let y=cy + baseRadius*Math.sin(a);

          // subtle mouse drift (keeps background alive)
          const mdx = (mouse.x - cx)/Math.max(1,cx);
          const mdy = (mouse.y - cy)/Math.max(1,cy);
          x += mdx*baseRadius*P.mouseGain;
          y += mdy*baseRadius*P.mouseGain;

          // pulsing ripple (your “breathing background”)
          const pulse = (Math.sin(t*1.0 + r*0.18) + Math.cos(t*1.35 + a*2.0)) * 0.5;
          x += Math.sin(a*3 + t + r*0.10) * baseRadius * P.pulseA;
          y += Math.cos(a*4 + t + r*0.10) * baseRadius * P.pulseA;
          x += Math.cos(a*2.2 + t) * pulse * 2.2;
          y += Math.sin(a*2.0 + t) * pulse * 2.2;

          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath();

        const alpha=0.08+(r/P.rings)*0.24;
        ctx.strokeStyle=`rgba(140,210,255,${alpha})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }

    function buildActiveEdges(){
      const active = [];
      for(let i=0;i<events.length;i++){
        for(let j=i+1;j<events.length;j++){
          const a=events[i], b=events[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          const maxD=(a.radius+b.radius)*P.edgeMaxD_factor;
          if(d < maxD){
            const wNear = depthWeight(d, maxD);
            const charge = wNear * (0.55 + 0.45*Math.min(a.life,b.life)); // near links charge more
            const minId=Math.min(a.id,b.id), maxId=Math.max(a.id,b.id);
            const key=`${minId}-${maxId}`;
            active.push({key,a,b,charge,d,maxD,wNear});
          }
        }
      }
      return active;
    }

    function updateEdgeMemory(active){
      frame++;

      for(const [k,rec] of edgeMemory.entries()){
        rec.strength = Math.max(0, rec.strength - P.edgeDecay);
        rec.ttl = Math.max(0, rec.ttl - P.edgeTTL_decay);

        for(let i=0;i<rec.trailAge.length;i++){
          rec.trailAge[i] = Math.max(0, rec.trailAge[i] - P.trailFade);
        }
        while(rec.trailAge.length && rec.trailAge[0] <= 0.001){
          rec.trailAge.shift();
          rec.trail.shift();
        }

        if((rec.strength <= 0.001 || rec.ttl <= 0.001) && rec.trail.length === 0){
          edgeMemory.delete(k);
        }
      }

      for(const e of active){
        const rec = edgeMemory.get(e.key) || { a:e.a, b:e.b, strength:0, ttl:0, trail:[], trailAge:[] };
        rec.a=e.a; rec.b=e.b;

        // strong persistence: charge adds slowly but sticks
        rec.strength = Math.min(1.0, rec.strength + P.edgeCharge*e.charge);
        rec.ttl = Math.min(1.0, rec.ttl + P.edgeTTL_gain*0.01*e.charge);

        // sample curved midpoint for trail -> creates sequences
        if(frame % P.trailSampleEvery === 0){
          const mp=bentMidpoint(e.a.x,e.a.y,e.b.x,e.b.y, P.trailCurviness*160*e.charge);
          rec.trail.push(mp);
          rec.trailAge.push(1.0);
          while(rec.trail.length > P.trailMaxPoints){
            rec.trail.shift(); rec.trailAge.shift();
          }
        }

        edgeMemory.set(e.key, rec);
      }
    }

    function lerp(a,b,t){ return a + (b-a)*t; }

    function drawTrails(){
      for(const rec of edgeMemory.values()){
        if(rec.trail.length < 2) continue;

        const avgAge = rec.trailAge.reduce((s,a)=>s+a,0)/Math.max(1,rec.trailAge.length);
        const s = rec.strength * (0.35 + 0.65*rec.ttl);

        // trails should feel “structural”, but still depthy
        const alpha = Math.min(0.55, 0.10 + 0.50*avgAge*s);
        const width = 0.9 + 3.0*avgAge*s;

        ctx.beginPath();
        for(let i=0;i<rec.trail.length;i++){
          const p=rec.trail[i];
          if(i===0) ctx.moveTo(p.x,p.y);
          else ctx.lineTo(p.x,p.y);
        }
        ctx.strokeStyle = `rgba(255,235,190,${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();
      }
    }

    function drawImmediateLinks(active){
      // Present-time links: depth perspective by distance
      for(const e of active){
        const a=e.a, b=e.b;

        // near => thick/bright ; far => thin/faint
        const width = lerp(P.widthFar, P.widthNear, e.wNear);
        const alpha = lerp(P.alphaFar, P.alphaNear, e.wNear);

        // also modulate by memory strength if already established
        const mem = edgeMemory.get(e.key);
        const m = mem ? (0.35 + 0.65*mem.strength) : 0.55;
        const alpha2 = Math.min(0.95, alpha * m);
        const width2 = width * (0.85 + 0.55*m);

        const mp=bentMidpoint(a.x,a.y,b.x,b.y, 110*e.wNear);

        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.quadraticCurveTo(mp.x, mp.y, b.x, b.y);
        ctx.strokeStyle = `rgba(255,250,220,${alpha2})`;
        ctx.lineWidth = width2;
        ctx.stroke();
      }
    }

    function drawEvents(){
      for(const e of events){
        e.phase += P.phaseSpeed;
        e.life *= 0.987; // slow decay so relations persist

        const drift = 0.08*e.energy*e.life;
        e.x += Math.cos(e.phase)*drift;
        e.y += Math.sin(e.phase*0.9)*drift;

        e.x = Math.max(10, Math.min(w-10, e.x));
        e.y = Math.max(10, Math.min(h-10, e.y));

        ctx.beginPath();
        ctx.arc(e.x,e.y, e.radius*e.life*0.16, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,210,120,${0.18 + 0.30*e.life})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(e.x,e.y, 2.4 + 2.0*e.energy, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,245,210,${0.25 + 0.45*e.life})`;
        ctx.fill();
      }
      events = events.filter(e=>e.life > 0.05);
    }

    function relinkEdgeRefs(){
      const byId = new Map(events.map(e=>[e.id,e]));
      for(const [k,rec] of edgeMemory.entries()){
        const [aId,bId]=k.split("-").map(Number);
        const a=byId.get(aId), b=byId.get(bId);
        if(a && b){ rec.a=a; rec.b=b; }
        else { rec.a=a||null; rec.b=b||null; }
      }
    }

    function render(){
      // keep traces longer (depth)
      ctx.fillStyle = `rgba(4,6,10,${P.bgFade})`;
      ctx.fillRect(0,0,w,h);

      // restore “pulsing background”
      drawPulsingField();

      const active = buildActiveEdges();
      updateEdgeMemory(active);

      // depth: trails first, then present links, then events
      drawTrails();
      drawImmediateLinks(active);
      drawEvents();
      relinkEdgeRefs();

      hud.innerHTML = `events: ${events.length}<br>links: ${active.length}`;

      t += 0.01;
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
