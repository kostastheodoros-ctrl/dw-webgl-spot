<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Design Walker — Morphogenetic Event Field</title>

<style>

html,body{
margin:0;
padding:0;
background:#05060a;
overflow:hidden;
}

#container{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
}

canvas{
display:block;
}

.hint{
position:fixed;
bottom:12px;
left:14px;
color:rgba(255,255,255,.75);
font-family:system-ui;
font-size:12px;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.easycam@1.2.1/p5.easycam.min.js"></script>

</head>

<body>

<div id="container"></div>

<div class="hint">
Drag = orbit • Wheel = zoom • Click = event
</div>

<script>

let easycam
let t=0

function setup(){

let canvas=createCanvas(window.innerWidth,window.innerHeight,WEBGL)
canvas.parent("container")

easycam=createEasyCam()

}

function windowResized(){

resizeCanvas(window.innerWidth,window.innerHeight)

}

function draw(){

background(6,7,12)

ambientLight(60)
directionalLight(255,255,255,0.2,0.4,-1)

t+=0.01

rotateY(t*0.4)
rotateX(t*0.3)

let R=260

for(let i=0;i<200;i++){

let a=i*0.31
let b=i*0.17

let x=R*cos(a)*(0.7+0.3*cos(b+t))
let y=R*sin(b)*(0.7+0.3*sin(a-t))
let z=R*sin(a*0.9+b*0.4)

push()

translate(x,y,z)

rotateY(t+i*0.03)

stroke(200,160,255,120)
strokeWeight(1)

fill(80,120,255,40)

let s=6+10*sin(i*0.2+t)

if(i%3==0) box(s)
if(i%3==1) sphere(s*0.6)
if(i%3==2) cone(s*0.6,s*1.2)

pop()

}

}

</script>

</body>
</html>
