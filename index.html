<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Walker — Generative Field</title>

<style>
html,body{
margin:0;
height:100%;
background:#05060a;
overflow:hidden;
font-family:system-ui;
}

svg{
width:100vw;
height:100vh;
display:block;
}

.ui{
position:fixed;
top:10px;
left:10px;
right:10px;
z-index:10;
color:white;
font-size:13px;
background:rgba(0,0,0,.35);
padding:10px;
border-radius:10px;
backdrop-filter:blur(6px);
display:flex;
justify-content:space-between;
}

input[type=range]{accent-color:#7dd3fc;}
</style>
</head>

<body>

<div class="ui">
<div>
<b>DESIGN AS EVENT — FIELD</b><br>
Move = reconfigure • Click = constellation event
</div>

<div>
Density <input id="density" type="range" min="0" max="100" value="70">
Glow <input id="glow" type="range" min="0" max="100" value="70">
</div>
</div>

<svg viewBox="0 0 900 520" id="svg">

<defs>

<radialGradient id="bg">
<stop offset="0%" stop-color="#0b1117"/>
<stop offset="100%" stop-color="#05060a"/>
</radialGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="2"/>
</filter>

</defs>

<rect width="900" height="520" fill="url(#bg)"/>

<g id="field" stroke="#9ae6ff" fill="none" stroke-width="1" filter="url(#glow)"></g>
<g id="threads" stroke="rgba(255,255,255,.12)" fill="none"></g>

<g id="constellations"></g>

</svg>

<script>

const svg=document.getElementById("svg")
const field=document.getElementById("field")
const threads=document.getElementById("threads")
const constellations=document.getElementById("constellations")

const density=document.getElementById("density")

let mx=450
let my=260

svg.addEventListener("mousemove",e=>{

const r=svg.getBoundingClientRect()

mx=(e.clientX-r.left)/r.width*900
my=(e.clientY-r.top)/r.height*520

})

let events=[]

svg.addEventListener("click",()=>{

spawnEvent(mx,my)

})

function spawnEvent(x,y){

const points=[]

for(let i=0;i<8+Math.random()*10;i++){

const a=Math.random()*Math.PI*2
const r=40+Math.random()*80

points.push({
x:x+r*Math.cos(a),
y:y+r*Math.sin(a)
})

}

events.push({
pts:points,
life:1
})

}

function line(p){

let d=`M ${p[0].x} ${p[0].y}`

for(let i=1;i<p.length;i++)
d+=` L ${p[i].x} ${p[i].y}`

return d

}

let t=0

function render(){

field.innerHTML=""
threads.innerHTML=""
constellations.innerHTML=""

const rings=25+density.value*0.3

for(let r=0;r<rings;r++){

const pts=[]
const radius=80+r*9

for(let i=0;i<180;i++){

const a=i/180*Math.PI*2

let x=450+(radius*Math.cos(a))
let y=260+(radius*Math.sin(a))

x+=(mx-450)*0.15
y+=(my-260)*0.15

x+=Math.sin(a*3+t+r*.1)*radius*.08
y+=Math.cos(a*4+t+r*.1)*radius*.08

pts.push({x,y})

}

const path=document.createElementNS("http://www.w3.org/2000/svg","path")

path.setAttribute("d",line(pts))
path.setAttribute("opacity",0.2+r/rings)

field.appendChild(path)

}

for(let e of events){

e.life*=0.98

for(let p of e.pts){

const c=document.createElementNS("http://www.w3.org/2000/svg","circle")

c.setAttribute("cx",p.x)
c.setAttribute("cy",p.y)
c.setAttribute("r",2)
c.setAttribute("fill","rgba(255,209,102,"+e.life+")")

constellations.appendChild(c)

}

if(e.life>0.05){

for(let i=0;i<e.pts.length-1;i++){

const p=document.createElementNS("http://www.w3.org/2000/svg","line")

p.setAttribute("x1",e.pts[i].x)
p.setAttribute("y1",e.pts[i].y)
p.setAttribute("x2",e.pts[i+1].x)
p.setAttribute("y2",e.pts[i+1].y)

p.setAttribute("stroke","rgba(255,209,102,"+e.life*.4+")")

constellations.appendChild(p)

}

}

}

events=events.filter(e=>e.life>0.05)

t+=0.016

requestAnimationFrame(render)

}

render()

</script>

</body>
</html>
