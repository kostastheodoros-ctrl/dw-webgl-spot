<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Walker — Event Field</title>

<style>
html,body{
margin:0;
height:100%;
background:#05060a;
overflow:hidden;
}

svg{
width:100vw;
height:100vh;
display:block;
}

.ui{
position:fixed;
top:12px;
left:12px;
right:12px;
z-index:10;
font:13px system-ui;
color:white;
background:rgba(0,0,0,.35);
padding:10px 12px;
border-radius:12px;
backdrop-filter:blur(6px);
display:flex;
justify-content:space-between;
}

input[type=range]{accent-color:#7dd3fc;}
</style>
</head>

<body>

<div class="ui">
<div>
<b>DESIGN AS EVENT — FIELD</b><br>
Move: reconfigure • Click: event shock
</div>

<div>
Density <input id="density" type="range" min="0" max="100" value="70">
Glow <input id="glow" type="range" min="0" max="100" value="70">
</div>
</div>

<svg id="svg" viewBox="0 0 900 520">

<defs>

<radialGradient id="bg" cx="50%" cy="40%" r="80%">
<stop offset="0%" stop-color="#0b1117"/>
<stop offset="100%" stop-color="#05060a"/>
</radialGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="2"/>
</filter>

</defs>

<rect width="900" height="520" fill="url(#bg)"/>

<g id="field" stroke="#a8e6ff" fill="none" stroke-width="1.2" filter="url(#glow)"></g>

</svg>

<script>

const svg = document.getElementById("svg")
const field = document.getElementById("field")

const densitySlider = document.getElementById("density")

let mx = 450
let my = 260

svg.addEventListener("mousemove", e=>{

const rect = svg.getBoundingClientRect()

mx = (e.clientX-rect.left)/rect.width*900
my = (e.clientY-rect.top)/rect.height*520

})

svg.addEventListener("click",()=>{
burst=1
})

let t=0
let burst=0

function linePath(p){

let d=`M ${p[0][0]} ${p[0][1]}`

for(let i=1;i<p.length;i++)
d+=` L ${p[i][0]} ${p[i][1]}`

return d

}

function render(){

field.innerHTML=""

const rings = 24 + densitySlider.value*0.25

for(let r=0;r<rings;r++){

const pts=[]

const radius = 80 + r*9

for(let i=0;i<=180;i++){

const a=i/180*Math.PI*2

let x=450+(radius*Math.cos(a))
let y=260+(radius*Math.sin(a))

const dx = (mx-450)/450
const dy = (my-260)/260

x += dx*radius*0.25
y += dy*radius*0.25

x += Math.sin(a*3+t+r*0.1)*radius*0.1
y += Math.cos(a*4+t+r*0.1)*radius*0.1

if(burst>0){

x+=Math.sin(a*6+t)*burst*30
y+=Math.cos(a*6+t)*burst*30

}

pts.push([x,y])

}

const path=document.createElementNS("http://www.w3.org/2000/svg","path")

path.setAttribute("d",linePath(pts))
path.setAttribute("opacity",0.2+r/rings)

field.appendChild(path)

}

burst*=0.94

t+=0.016

requestAnimationFrame(render)

}

render()

</script>

</body>
</html>
