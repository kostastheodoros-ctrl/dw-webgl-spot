<script>
(() => {
  const svg = document.getElementById('svg');
  const halo = document.getElementById('halo');
  const g = document.getElementById('g');
  const sparks = document.getElementById('sparks');
  const statusEl = document.getElementById('status');
  const btnRand = document.getElementById('rand');
  const btnReset = document.getElementById('reset');
  const sIntensity = document.getElementById('intensity');
  const sGlow = document.getElementById('glow');

  const W=900,H=520,cx=W/2,cy=H/2;

  let mode=1, live=true, seed=(Math.random()*1e9)|0;
  let t=0, mx=cx, my=cy;

  // burst state
  let burst=0, burstPhase=0, sparkTTL=0;

  // AUDIO (optional mic) + fallback pulse
  let audioOn = false;
  let audioLevel = 0;      // 0..1 (smoothed)
  let audioTarget = 0;     // raw-ish
  let analyser, dataArr, rafAudio;

  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  // deterministic pseudo-random
  function rand01(i){
    let x = (seed ^ (i*0x9e3779b1)) >>> 0;
    x ^= x << 13; x >>>= 0;
    x ^= x >> 17; x >>>= 0;
    x ^= x << 5;  x >>>= 0;
    return (x % 100000) / 100000;
  }

  function setStatus(extra=''){
    statusEl.textContent = `mode ${mode} • ${live?'live':'frozen'} • seed ${seed}${extra}`;
  }

  function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

  function linePath(points){
    let d = `M ${points[0][0].toFixed(2)} ${points[0][1].toFixed(2)}`;
    for(let i=1;i<points.length;i++) d += ` L ${points[i][0].toFixed(2)} ${points[i][1].toFixed(2)}`;
    return d;
  }

  function strokeByMode(){
    return (mode===1) ? 'rgba(170,235,255,.62)'
         : (mode===2) ? 'rgba(255,170,230,.58)'
         : (mode===3) ? 'rgba(255,240,170,.48)'
         : 'rgba(170,255,210,.56)';
  }

  async function enableMic(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const src = ctx.createMediaStreamSource(stream);
      analyser = ctx.createAnalyser();
      analyser.fftSize = 1024;
      dataArr = new Uint8Array(analyser.fftSize);
      src.connect(analyser);
      audioOn = true;
      setStatus(' • mic on');
      const tick = () => {
        analyser.getByteTimeDomainData(dataArr);
        // RMS
        let sum=0;
        for(let i=0;i<dataArr.length;i++){
          const v=(dataArr[i]-128)/128;
          sum += v*v;
        }
        const rms = Math.sqrt(sum/dataArr.length); // ~0..1
        audioTarget = clamp(rms*2.2, 0, 1);        // boost
        audioLevel = audioLevel*0.86 + audioTarget*0.14;
        rafAudio = requestAnimationFrame(tick);
      };
      tick();
    } catch(e){
      // silent fail
      audioOn = false;
      setStatus(' • mic blocked');
    }
  }

  // Add a mic toggle button without touching HTML (injected)
  const ui = document.querySelector('.ui > div:last-child');
  const micBtn = document.createElement('button');
  micBtn.className = 'btn';
  micBtn.id = 'mic';
  micBtn.textContent = 'Mic';
  micBtn.title = 'Enable microphone reactive pulse (optional)';
  ui.insertBefore(micBtn, ui.firstChild);

  micBtn.addEventListener('click', async () => {
    if(audioOn){
      audioOn = false;
      audioLevel = 0;
      if(rafAudio) cancelAnimationFrame(rafAudio);
      micBtn.textContent = 'Mic';
      setStatus('');
      return;
    }
    micBtn.textContent = 'Mic…';
    await enableMic();
    micBtn.textContent = audioOn ? 'Mic on' : 'Mic';
  });

  // Bind glow slider to filter blur strength
  const glowFx = document.getElementById('glowFx');
  const feBlur = glowFx.querySelector('feGaussianBlur');
  sGlow.addEventListener('input', () => {
    const gv = (+sGlow.value)/100;
    feBlur.setAttribute('stdDeviation', (1.2 + 3.6*gv).toFixed(2));
  });

  function render(){
    clear(halo); clear(g); clear(sparks);

    const ux = (mx/W)*2 - 1;
    const uy = (my/H)*2 - 1;
    const pull = Math.sqrt(ux*ux + uy*uy);
    const k = clamp(pull,0,1);

    const intensity = (+sIntensity.value)/100;
    const glow = (+sGlow.value)/100;

    // AUDIO → event pulse (even without mic: subtle auto-beat)
    const autoBeat = 0.45 + 0.55*Math.max(0, Math.sin(t*1.6));
    const audio = audioOn ? audioLevel : (0.18*autoBeat);
    const pulse = clamp(audio, 0, 1);

    // Use pulse to drive burst + sparks (but bounded)
    burst = Math.max(burst, pulse*0.85);
    sparkTTL = Math.max(sparkTTL, pulse*0.75);

    const sw = 1.0 + 0.9*intensity;
    g.setAttribute('stroke-width', (1.05 + 0.55*intensity).toFixed(2));
    g.setAttribute('stroke', strokeByMode());

    const rings = Math.round(20 + 14*intensity + (mode===4?6:0));
    const segs  = Math.round(140 + 120*intensity + (mode===4?40:0));

    const baseR = 72 + 190*(0.52 + 0.48*Math.sin(t*0.92));
    const tilt  = (0.16 + 0.42*k) * (0.65 + 0.55*intensity);

    const twist = (0.22 + 1.35*k) * (0.55 + 0.95*intensity) + 1.55*burst;

    const haloEvery = Math.max(2, Math.round(7 - 5*glow));

    // halo shells
    for(let r=0;r<rings;r+=haloEvery){
      const rr = baseR + r*9.2;
      const pts=[];
      for(let i=0;i<=segs;i++){
        const a=(i/segs)*Math.PI*2;
        const wob = 0.05*Math.sin(a*5 + t*1.1 + r*0.22) + 0.03*Math.cos(a*3 - t*0.9);
        let x=cx + rr*Math.cos(a);
        let y=cy + rr*Math.sin(a);
        y = cy + (y-cy)*(1 - tilt*((x-cx)/(rr+1))**2);
        x += wob*rr*0.55;
        y += wob*rr*0.35;
        pts.push([x,y]);
      }
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d', linePath(pts));
      p.setAttribute('opacity', (0.10 + 0.10*(r/rings) + 0.22*glow + 0.10*pulse).toFixed(3));
      p.setAttribute('stroke-width', (0.9 + 0.6*glow + 0.5*pulse).toFixed(2));
      halo.appendChild(p);
    }

    const px = ux*128, py = uy*128;

    for(let r=0;r<rings;r++){
      const rr = baseR + r*9.2;
      const pts=[];
      for(let i=0;i<=segs;i++){
        const a=(i/segs)*Math.PI*2;

        const n1 = rand01(r*1000 + i*7);
        const n2 = rand01(r*2000 + i*11);

        const warp = (mode===1)?0.60 : (mode===2)?0.92 : (mode===3)?1.18 : 1.50;

        const sA = Math.sin(a*3 + t*1.25 + r*0.12);
        const cA = Math.cos(a*2 - t*1.05 + r*0.10);

        const dr = rr*(0.085*warp)*(((n1-0.5)*2) + 0.60*sA + 0.38*cA) * twist;

        let x = cx + (rr + dr)*Math.cos(a);
        let y = cy + (rr + dr)*Math.sin(a);

        const dx = (x - cx)/(rr+1);
        y = cy + (y - cy) * (1 - tilt*dx*dx);

        x += px*(0.16 + 0.84*(r/rings))*(0.20 + 0.80*n2)*(0.40 + 0.60*k);
        y += py*(0.16 + 0.84*(r/rings))*(0.20 + 0.80*n1)*(0.40 + 0.60*k);

        const shock = burst * 165 * Math.sin(a*4 + r*0.25 + burstPhase);
        x += shock*0.06*(r/rings);
        y += shock*0.06*(r/rings);

        pts.push([x,y]);
      }

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', linePath(pts));
      path.setAttribute('opacity', (0.10 + 0.92*(r/rings)).toFixed(3));
      path.setAttribute('stroke-width', (sw*(0.85 + 0.55*(r/rings))).toFixed(2));
      g.appendChild(path);
    }

    // event cut line
    const cutY = cy + uy*150;
    const cut = document.createElementNS('http://www.w3.org/2000/svg','path');
    cut.setAttribute('d', `M 40 ${cutY.toFixed(1)} L 860 ${(cutY + uy*24).toFixed(1)}`);
    cut.setAttribute('stroke', 'rgba(255,255,255,.20)');
    cut.setAttribute('stroke-width', (1 + 0.7*intensity + 0.9*pulse).toFixed(2));
    cut.setAttribute('opacity', (0.35 + 0.35*k + 0.35*burst).toFixed(3));
    sparks.appendChild(cut);

    // sparks (pulse-driven)
    if(sparkTTL>0){
      const count = Math.round(14 + 30*intensity + 22*pulse);
      for(let i=0;i<count;i++){
        const a = (Math.PI*2)*(i/count) + 0.5*Math.sin(t*1.5+i);
        const len = (22 + 52*rand01(i*33)) * (0.55 + 0.9*intensity + 0.8*pulse);
        const x1 = cx + (120 + 240*rand01(i*71))*Math.cos(a);
        const y1 = cy + (120 + 240*rand01(i*97))*Math.sin(a);
        const x2 = x1 + len*Math.cos(a);
        const y2 = y1 + len*Math.sin(a);

        const p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', `M ${x1.toFixed(1)} ${y1.toFixed(1)} L ${x2.toFixed(1)} ${y2.toFixed(1)}`);
        p.setAttribute('opacity', (0.06 + 0.55*(sparkTTL/1)).toFixed(3));
        sparks.appendChild(p);
      }
      sparkTTL = Math.max(0, sparkTTL - 0.028);
    }

    burst = Math.max(0, burst - 0.016);
    burstPhase += 0.085*burst;

    if(live){
      t += 0.017;
      requestAnimationFrame(render);
    }
  }

  function svgPointFromEvent(e){
    const rect = svg.getBoundingClientRect();
    const x = ((e.clientX - rect.left)/rect.width)*W;
    const y = ((e.clientY - rect.top)/rect.height)*H;
    return {x: clamp(x,0,W), y: clamp(y,0,H)};
  }

  svg.addEventListener('mousemove', (e) => {
    const p = svgPointFromEvent(e);
    mx = p.x; my = p.y;
  });

  svg.addEventListener('click', () => {
    burst = 1;
    sparkTTL = 1;
    if(!live){ live=true; setStatus(audioOn?' • mic on':''); requestAnimationFrame(render); }
  });

  window.addEventListener('keydown', (e) => {
    if(e.key === ' '){
      live = !live;
      setStatus(audioOn?' • mic on':'');
      if(live) requestAnimationFrame(render);
      e.preventDefault();
    }
    if(e.key === 'r' || e.key === 'R'){
      seed=(Math.random()*1e9)|0; burst=1; sparkTTL=1;
      setStatus(audioOn?' • mic on':'');
      if(!live){live=true; requestAnimationFrame(render);}
    }
    if(e.key === '1'){ mode=1; setStatus(audioOn?' • mic on':''); if(!live){live=true; requestAnimationFrame(render);} }
    if(e.key === '2'){ mode=2; setStatus(audioOn?' • mic on':''); if(!live){live=true; requestAnimationFrame(render);} }
    if(e.key === '3'){ mode=3; setStatus(audioOn?' • mic on':''); if(!live){live=true; requestAnimationFrame(render);} }
    if(e.key === '4'){ mode=4; setStatus(audioOn?' • mic on':''); if(!live){live=true; requestAnimationFrame(render);} }
  });

  btnRand.addEventListener('click', () => {
    seed=(Math.random()*1e9)|0; burst=1; sparkTTL=1;
    setStatus(audioOn?' • mic on':'');
    if(!live){live=true; requestAnimationFrame(render);}
  });

  btnReset.addEventListener('click', () => {
    mx=cx; my=cy; t=0; burst=1; sparkTTL=1;
    setStatus(audioOn?' • mic on':'');
    if(!live){live=true; requestAnimationFrame(render);}
  });

  setStatus('');
  requestAnimationFrame(render);
})();
</script>
