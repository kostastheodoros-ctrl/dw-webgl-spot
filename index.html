<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Walker — Event Field</title>

<style>
html,body{
margin:0;
height:100%;
background:#05060a;
overflow:hidden;
font-family:system-ui,Segoe UI,Roboto,Arial;
}

svg{
width:100vw;
height:100vh;
display:block;
}

.ui{
position:fixed;
top:10px;
left:12px;
right:12px;
padding:10px 12px;
background:rgba(0,0,0,.35);
border:1px solid rgba(255,255,255,.18);
border-radius:12px;
backdrop-filter:blur(6px);
color:#eaeaea;
font-size:13px;
display:flex;
justify-content:space-between;
align-items:center;
}

.btn{
cursor:pointer;
background:#0b0f14;
color:#eaeaea;
border:1px solid rgba(255,255,255,.2);
border-radius:8px;
padding:6px 10px;
}
</style>
</head>

<body>

<div class="ui">
<div><b>DESIGN AS EVENT</b></div>
<div>
<button class="btn" id="rand">Reseed</button>
</div>
</div>

<svg id="svg" viewBox="0 0 900 520">

<defs>

<radialGradient id="bg">
<stop offset="0%" stop-color="#0b1117"/>
<stop offset="100%" stop-color="#05060a"/>
</radialGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="3"/>
</filter>

</defs>

<rect width="900" height="520" fill="url(#bg)"/>

<g id="halo" stroke="#8be9fd" fill="none" filter="url(#glow)"></g>
<g id="field" stroke="#8be9fd" fill="none"></g>
<g id="sparks" stroke="#ffffff"></g>

<!-- DW identity -->
<g id="dwMark" stroke="#ffd166" stroke-width="2.2" fill="none" opacity=".25">

<path d="
M 140 120 L 140 400
M 140 400 L 220 400
Q 300 400 300 320
L 300 200
Q 300 120 220 120
L 140 120

M 360 120 L 360 400
M 360 400 L 470 400
Q 610 400 610 260
Q 610 120 470 120
L 360 120
"/>

</g>

</svg>

<script>

const svg=document.getElementById("svg")
const field=document.getElementById("field")
const halo=document.getElementById("halo")
const sparks=document.getElementById("sparks")
const randBtn=document.getElementById("rand")

const W=900
const H=520
const cx=W/2
const cy=H/2

let t=0
let seed=Math.random()*1000

function rand(i){

let x=(seed+i*9999)|0
x^=x<<13
x^=x>>17
x^=x<<5
return (x%1000)/1000

}

function clear(node){
while(node.firstChild)node.removeChild(node.firstChild)
}

function path(points){

let d=`M ${points[0][0]} ${points[0][1]}`

for(let i=1;i<points.length;i++){

d+=` L ${points[i][0]} ${points[i][1]}`

}

return d

}

function render(){

clear(field)
clear(halo)
clear(sparks)

const rings=26
const segs=160

const base=90+140*Math.sin(t*.8)

for(let r=0;r<rings;r++){

const rr=base+r*9

const pts=[]

for(let i=0;i<=segs;i++){

const a=i/segs*Math.PI*2

const wob=Math.sin(a*3+t+r*.2)*.2

const x=cx+(rr+wob*40)*Math.cos(a)
const y=cy+(rr+wob*20)*Math.sin(a)

pts.push([x,y])

}

const p=document.createElementNS("http://www.w3.org/2000/svg","path")

p.setAttribute("d",path(pts))
p.setAttribute("opacity",.15+.8*(r/rings))
p.setAttribute("stroke-width",1.2)

field.appendChild(p)

}

for(let i=0;i<20;i++){

const a=Math.random()*Math.PI*2
const r=160+Math.random()*180

const x1=cx+r*Math.cos(a)
const y1=cy+r*Math.sin(a)

const x2=x1+20*Math.cos(a)
const y2=y1+20*Math.sin(a)

const p=document.createElementNS("http://www.w3.org/2000/svg","path")

p.setAttribute("d",`M ${x1} ${y1} L ${x2} ${y2}`)
p.setAttribute("opacity",.4)

sparks.appendChild(p)

}

t+=.015

requestAnimationFrame(render)

}

randBtn.onclick=()=>{

seed=Math.random()*1000

}

render()

</script>

</body>
</html>
