<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Design as Event — Morphogenetic Field (φ-resonant persistence)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#eaf2ff;background:#04060a;}
    canvas{display:block;}
    .ui{
      position:fixed;top:14px;left:14px;max-width:680px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
    }
    .ui b{letter-spacing:.2px;}
    .hud{
      position:fixed;top:14px;right:14px;
      background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
      padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.35;
      border:1px solid rgba(160,200,255,.16);
      min-width:210px;text-align:right;
    }
  </style>
</head>

<body>
  <div class="ui">
    <b>DESIGN AS EVENT — MORPHOGENETIC FIELD</b><br>
    Click → event birth<br>
    Gold links (φ) → <b>events persist longer</b> (life-recharge + floor)<br>
    Aim: φ relations become perceptible (duration + emphasis)
  </div>
  <div class="hud" id="hud">events: 0<br>links: 0<br>phi-links: 0<br>phi-persistence: 0</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");

    let w=0,h=0;
    function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
    addEventListener("resize", resize);
    resize();

    let t=0, frame=0;
    let nextId=1;

    let mouse = { x: innerWidth/2, y: innerHeight/2 };
    addEventListener("mousemove",(e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

    let events = [];
    // key -> {a,b,strength,ttl,phiScore}
    let edgeMemory = new Map();

    const PHI = (1 + Math.sqrt(5)) / 2; // 1.618...
    const INV_PHI = 1 / PHI;            // 0.618...

    const P = {
      // event birth
      energyMin: 0.85,
      energyMax: 2.05,
      radiusBase: 105,
      radiusK: 215,
      lifeInit: 1.0,

      // background (not black)
      bgFade: 0.07,
      bgGlow: 0.30,
      bgVignette: 0.24,

      // pulsing ring-field
      rings: 26,
      ringPoints: 170,
      ringSpacing: 14,
      ringStart: 56,
      mouseGain: 0.11,
      pulseA: 0.075,

      // linking (make relationships form easily)
      edgeMaxD_factor: 0.98,

      // base memory (already strong)
      edgeCharge: 0.090,
      edgeDecay: 0.0010,
      edgeTTL_gain: 3.0,
      edgeTTL_decay: 0.0011,

      // perspective
      widthNear: 3.8,
      widthFar: 0.8,
      alphaNear: 0.78,
      alphaFar: 0.08,

      // φ resonance (VERY VISIBLE + VERY STRONG)
      phiTolerance: 0.16,         // wider gate -> more φ hits
      phiGate: 0.55,              // must exceed this to count as φ-link
      phiLinkWidthBoost: 2.4,     // thicker
      phiLinkAlphaBoost: 1.35,    // brighter

      // φ causes EVENT persistence (the user requirement)
      phiLifeFloor: 0.45,         // if φ present, event life cannot drop below this
      phiLifeRecharge: 0.020,     // per φ-link per frame (scaled) add back life
      phiLifeGlobalCap: 1.0,      // cap
      baseLifeDecay: 0.988,       // normal decay (slower already)

      // small drift so events don’t freeze rigidly
      phaseSpeed: 0.015,
      driftK: 0.08
    };

    addEventListener("click",(e)=>createEvent(e.clientX,e.clientY));

    function createEvent(x,y){
      const energy = P.energyMin + Math.random()*(P.energyMax-P.energyMin);
      const radius = P.radiusBase + P.radiusK*energy;
      events.push({
        id: nextId++,
        x,y,
        energy,
        radius,
        life: P.lifeInit,
        phase: Math.random()*Math.PI*2,
        phiHold: 0 // will rise when φ-relations exist
      });
    }

    function clamp01(x){ return Math.max(0, Math.min(1, x)); }
    function lerp(a,b,t){ return a + (b-a)*t; }

    // scale-invariant φ score: s = d / sqrt(rA*rB)
    function phiScore(d, rA, rB){
      const s = d / Math.max(1e-6, Math.sqrt(rA*rB));
      const err = Math.min(Math.abs(s - PHI), Math.abs(s - INV_PHI));
      const score = 1 - (err / P.phiTolerance);
      return clamp01(score);
    }

    function depthWeight(d, maxD){
      const x = 1 - (d / Math.max(1,maxD));
      return clamp01(x*x);
    }

    function bentMidpoint(ax,ay,bx,by,amount){
      const mx=(ax+bx)/2, my=(ay+by)/2;
      const dx=bx-ax, dy=by-ay;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len, ny=dx/len;
      const wobble=Math.sin(t*1.1 + (ax+ay+bx+by)*0.003) * amount;
      return { x: mx + nx*wobble, y: my + ny*wobble };
    }

    function drawGradientBackground(){
      const cx=w/2, cy=h/2;
      const grd = ctx.createRadialGradient(cx, cy, Math.min(w,h)*0.05, cx, cy, Math.min(w,h)*0.95);
      grd.addColorStop(0, `rgba(18,28,44,${P.bgGlow})`);
      grd.addColorStop(0.55, `rgba(6,10,18,0.22)`);
      grd.addColorStop(1, `rgba(4,6,10,${P.bgVignette})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0,0,w,h);

      // persistence veil
      ctx.fillStyle = `rgba(4,6,10,${P.bgFade})`;
      ctx.fillRect(0,0,w,h);
    }

    function drawPulsingField(){
      const cx=w/2, cy=h/2;
      for(let r=0;r<P.rings;r++){
        const baseRadius = P.ringStart + r*P.ringSpacing;
        ctx.beginPath();
        for(let i=0;i<P.ringPoints;i++){
          const a=(i/P.ringPoints)*Math.PI*2;
          let x=cx + baseRadius*Math.cos(a);
          let y=cy + baseRadius*Math.sin(a);

          const mdx = (mouse.x - cx)/Math.max(1,cx);
          const mdy = (mouse.y - cy)/Math.max(1,cy);
          x += mdx*baseRadius*P.mouseGain;
          y += mdy*baseRadius*P.mouseGain;

          const pulse = (Math.sin(t*1.0 + r*0.18) + Math.cos(t*1.35 + a*2.0)) * 0.5;
          x += Math.sin(a*3 + t + r*0.10) * baseRadius * P.pulseA;
          y += Math.cos(a*4 + t + r*0.10) * baseRadius * P.pulseA;
          x += Math.cos(a*2.2 + t) * pulse * 2.0;
          y += Math.sin(a*2.0 + t) * pulse * 2.0;

          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath();
        const alpha=0.07+(r/P.rings)*0.20;
        ctx.strokeStyle=`rgba(140,210,255,${alpha})`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }

    function buildActiveEdges(){
      const active = [];
      let phiCount = 0;

      for(let i=0;i<events.length;i++){
        for(let j=i+1;j<events.length;j++){
          const a=events[i], b=events[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          const maxD=(a.radius+b.radius)*P.edgeMaxD_factor;

          if(d < maxD){
            const near = depthWeight(d, maxD);
            const ps = phiScore(d, a.radius, b.radius);
            const minId=Math.min(a.id,b.id), maxId=Math.max(a.id,b.id);
            const key=`${minId}-${maxId}`;

            // charge: near + φ increases
            const charge = near * (0.55 + 0.45*Math.min(a.life,b.life)) * (1 + 0.9*ps);

            const isPhi = ps >= P.phiGate;
            if(isPhi) phiCount++;

            active.push({key,a,b,d,maxD,near,phiScore:ps,isPhi,charge});
          }
        }
      }
      return { active, phiCount };
    }

    function updateEdgeMemory(active){
      // decay memory
      for(const [k,rec] of edgeMemory.entries()){
        rec.strength = Math.max(0, rec.strength - P.edgeDecay);
        rec.ttl = Math.max(0, rec.ttl - P.edgeTTL_decay);
        rec.phiScore = (rec.phiScore||0) * 0.999; // tiny fade
        if(rec.strength <= 0.001 || rec.ttl <= 0.001){
          edgeMemory.delete(k);
        }
      }

      // charge
      for(const e of active){
        const rec = edgeMemory.get(e.key) || { a:e.a, b:e.b, strength:0, ttl:0, phiScore:0 };
        rec.a=e.a; rec.b=e.b;
        rec.phiScore = Math.max(rec.phiScore, e.phiScore);
        rec.strength = Math.min(1.0, rec.strength + P.edgeCharge * e.charge);
        rec.ttl = Math.min(1.0, rec.ttl + P.edgeTTL_gain * 0.01 * e.charge);
        edgeMemory.set(e.key, rec);
      }
    }

    // THIS is the key requirement: φ relations keep EVENTS alive
    function applyPhiPersistence(active){
      // reset
      for(const e of events) e.phiHold = 0;

      let phiPersistence = 0;

      for(const e of active){
        if(!e.isPhi) continue;

        // distribute “hold” to endpoints
        const ps = e.phiScore; // 0.55..1
        const hold = ps * (0.6 + 0.4*e.near);

        e.a.phiHold += hold;
        e.b.phiHold += hold;
        phiPersistence += hold;
      }

      // convert hold into life floor + recharge
      for(const e of events){
        if(e.phiHold <= 0) continue;

        // floor: perceptibility guarantee
        e.life = Math.max(e.life, P.phiLifeFloor);

        // recharge: extends duration strongly and visibly
        const add = P.phiLifeRecharge * e.phiHold;
        e.life = Math.min(P.phiLifeGlobalCap, e.life + add);
      }

      return phiPersistence;
    }

    function drawLinks(active){
      for(const e of active){
        const a=e.a, b=e.b;

        const baseW = lerp(P.widthFar, P.widthNear, e.near);
        const baseA = lerp(P.alphaFar, P.alphaNear, e.near);

        const mem = edgeMemory.get(e.key);
        const m = mem ? (0.35 + 0.65*mem.strength) : 0.6;
        let width = baseW * (0.85 + 0.55*m);
        let alpha = Math.min(0.92, baseA * m);

        const ps = mem ? (mem.phiScore||0) : e.phiScore;

        // φ emphasis: obvious gold + thicker + brighter
        if(ps >= P.phiGate){
          width *= P.phiLinkWidthBoost;
          alpha = Math.min(0.98, alpha * P.phiLinkAlphaBoost);
        }

        const mp=bentMidpoint(a.x,a.y,b.x,b.y, (110*e.near) * (1 + 0.4*ps));

        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.quadraticCurveTo(mp.x, mp.y, b.x, b.y);

        if(ps >= P.phiGate){
          // gold
          ctx.strokeStyle = `rgba(255,215,120,${alpha})`;
        } else {
          // pale
          ctx.strokeStyle = `rgba(255,250,220,${alpha})`;
        }
        ctx.lineWidth = width;
        ctx.stroke();

        // small φ marker on the midpoint for clarity
        if(ps >= P.phiGate){
          ctx.beginPath();
          ctx.arc(mp.x, mp.y, 2.2 + 3.0*ps, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,215,120,${Math.min(0.9, 0.35 + 0.55*ps)})`;
          ctx.fill();
        }
      }
    }

    function drawEvents(){
      for(const e of events){
        e.phase += P.phaseSpeed;

        // decay (but φ will counteract this)
        e.life *= P.baseLifeDecay;

        // micro drift (keeps it alive visually)
        const drift = P.driftK * e.energy * e.life;
        e.x += Math.cos(e.phase) * drift;
        e.y += Math.sin(e.phase*0.9) * drift;

        e.x = Math.max(10, Math.min(w-10, e.x));
        e.y = Math.max(10, Math.min(h-10, e.y));

        // halo
        ctx.beginPath();
        ctx.arc(e.x,e.y, e.radius*e.life*0.15, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,210,120,${0.16 + 0.34*e.life})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // dot
        ctx.beginPath();
        ctx.arc(e.x,e.y, 2.6 + 2.1*e.energy, 0, Math.PI*2);
        const glow = Math.min(1, 0.20 + 0.55*e.life + 0.20*clamp01(e.phiHold));
        ctx.fillStyle = `rgba(255,245,210,${glow})`;
        ctx.fill();

        // φ aura: if held, show golden ring
        if(e.phiHold > 0.2){
          const a = Math.min(0.85, 0.20 + 0.55*clamp01(e.phiHold));
          ctx.beginPath();
          ctx.arc(e.x,e.y, 10 + 22*clamp01(e.phiHold), 0, Math.PI*2);
          ctx.strokeStyle = `rgba(255,215,120,${a})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }

      // remove only if truly dead (φ can keep them alive)
      events = events.filter(e=>e.life > 0.03);
    }

    function relinkEdgeRefs(){
      const byId = new Map(events.map(e=>[e.id,e]));
      for(const [k,rec] of edgeMemory.entries()){
        const [aId,bId]=k.split("-").map(Number);
        const a=byId.get(aId), b=byId.get(bId);
        if(a && b){ rec.a=a; rec.b=b; }
        else edgeMemory.delete(k);
      }
    }

    function render(){
      frame++;
      drawGradientBackground();
      drawPulsingField();

      const { active, phiCount } = buildActiveEdges();
      updateEdgeMemory(active);

      // apply φ event persistence BEFORE drawing events (so you see it immediately)
      const phiPersistence = applyPhiPersistence(active);

      drawLinks(active);
      drawEvents();
      relinkEdgeRefs();

      hud.innerHTML =
        `events: ${events.length}<br>` +
        `links: ${active.length}<br>` +
        `phi-links: ${phiCount}<br>` +
        `phi-persistence: ${phiPersistence.toFixed(2)}`;

      t += 0.01;
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
