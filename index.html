<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DW Morphogenetic Field</title>

<style>
html,body{margin:0;height:100%;background:#05060b;overflow:hidden;font-family:system-ui}
canvas{display:block;width:100vw;height:100vh}

#hud{
position:fixed;left:12px;top:12px;
padding:10px;border-radius:10px;
background:rgba(0,0,0,.5);
color:white;font-size:13px
}

#reset{
position:fixed;
right:12px;
top:12px;
padding:10px 16px;
background:#ffd36e;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud">
DW Field<br>
Nodes: <span id="nodes">0</span>
</div>

<button id="reset">RESET</button>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let nodes=[]
let edges=[]
let locks=[]

function resetEngine(){

nodes.length=0
edges.length=0
locks.length=0

ctx.fillStyle="#05060b"
ctx.fillRect(0,0,canvas.width,canvas.height)

seed()

}

document.getElementById("reset").onclick=resetEngine

window.addEventListener("keydown",e=>{
if(e.key==="r") resetEngine()
})

function seed(){

for(let i=0;i<20;i++){

nodes.push({

x:(Math.random()-0.5)*300,
y:(Math.random()-0.5)*200,
vx:(Math.random()-0.5)*20,
vy:(Math.random()-0.5)*20,
life:10+Math.random()*10

})

}

}

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect()

nodes.push({

x:e.clientX-rect.left-canvas.width/2,
y:e.clientY-rect.top-canvas.height/2,
vx:(Math.random()-0.5)*20,
vy:(Math.random()-0.5)*20,
life:10+Math.random()*10

})

if(nodes.length>80) nodes.shift()

})

function dist(a,b){

const dx=a.x-b.x
const dy=a.y-b.y

return Math.sqrt(dx*dx+dy*dy)

}

function buildEdges(){

edges.length=0

for(let i=0;i<nodes.length;i++){

for(let j=i+1;j<nodes.length;j++){

if(dist(nodes[i],nodes[j])<140){

edges.push([i,j])

}

}

}

}

function step(dt){

for(const n of nodes){

n.x+=n.vx*dt
n.y+=n.vy*dt

n.vx*=0.985
n.vy*=0.985

n.life-=dt

}

for(let i=nodes.length-1;i>=0;i--){

if(nodes[i].life<=0 && nodes.length>20)
nodes.splice(i,1)

}

}

function draw(){

ctx.fillStyle="rgba(5,6,11,0.1)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(120,210,255,0.3)"

for(const e of edges){

const A=nodes[e[0]]
const B=nodes[e[1]]

ctx.beginPath()
ctx.moveTo(canvas.width/2+A.x,canvas.height/2+A.y)
ctx.lineTo(canvas.width/2+B.x,canvas.height/2+B.y)
ctx.stroke()

}

for(const n of nodes){

ctx.beginPath()
ctx.arc(canvas.width/2+n.x,canvas.height/2+n.y,3,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

}

document.getElementById("nodes").textContent=nodes.length

}

seed()

let last=performance.now()

function frame(now){

let dt=(now-last)/1000
last=now

if(dt>0.12){

console.warn("watchdog reset")
resetEngine()
return

}

buildEdges()
step(dt)
draw()

requestAnimationFrame(frame)

}

requestAnimationFrame(frame)

</script>

</body>
</html>
