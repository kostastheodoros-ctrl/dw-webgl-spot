<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DW — WebGL Self-Test</title>
  <style>
    html,body{margin:0;height:100%;background:#05060a;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    #overlay{
      position:fixed;left:12px;top:10px;right:12px;
      color:rgba(255,255,255,.85);font-size:13px;line-height:1.45;
      background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);
      border-radius:10px;padding:10px 12px;backdrop-filter: blur(6px);
      z-index:10;
    }
    #overlay b{color:#fff;}
    #overlay code{color:#7dd3fc;}
    canvas{display:block;}
  </style>
</head>
<body>
  <div id="overlay">
    <b>DW WebGL Self-Test</b><br>
    Status: <span id="status">checking…</span><br>
    If you see a rotating cube, WebGL works. If not, WebGL is blocked/disabled.<br>
    URL: <code id="url"></code>
  </div>

  <!-- three.js (minimal, reliable WebGL test) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    document.getElementById('url').textContent = location.href;

    function webglSupport(){
      try{
        const c=document.createElement('canvas');
        const gl=c.getContext('webgl') || c.getContext('experimental-webgl');
        return !!gl;
      }catch(e){ return false; }
    }

    const statusEl=document.getElementById('status');

    if(!webglSupport()){
      statusEl.innerHTML = '<b style="color:#ff9aa2">WebGL NOT available</b> — browser/GPU setting blocks it.';
      // Add a visible 2D fallback so we know JS runs
      const c=document.createElement('canvas');
      c.width=window.innerWidth; c.height=window.innerHeight;
      document.body.appendChild(c);
      const ctx=c.getContext('2d');
      ctx.fillStyle='#05060a'; ctx.fillRect(0,0,c.width,c.height);
      ctx.fillStyle='rgba(125,211,252,.95)';
      ctx.font='16px system-ui';
      ctx.fillText('2D OK — WebGL blocked/disabled', 20, 90);
      ctx.strokeStyle='rgba(255,255,255,.25)';
      ctx.strokeRect(18,110,320,50);
      ctx.fillStyle='rgba(255,255,255,.8)';
      ctx.fillText('Fix: enable hardware acceleration / WebGL', 28, 142);
    } else {
      statusEl.innerHTML = '<b style="color:#b7ffb7">WebGL available</b> — rendering…';

      const renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
      renderer.setClearColor(0x05060a, 1);
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
      camera.position.set(0, 0, 6);

      const lightA = new THREE.AmbientLight(0xffffff, 0.35);
      scene.add(lightA);
      const lightD = new THREE.DirectionalLight(0xffffff, 0.9);
      lightD.position.set(2, 3, 4);
      scene.add(lightD);

      const geo = new THREE.BoxGeometry(1.6, 1.6, 1.6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x7dd3fc,
        metalness: 0.2,
        roughness: 0.35
      });
      const cube = new THREE.Mesh(geo, mat);
      scene.add(cube);

      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({color: 0xffffff, transparent:true, opacity:0.35})
      );
      cube.add(wire);

      function animate(){
        cube.rotation.x += 0.008;
        cube.rotation.y += 0.012;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
      });
    }
  </script>
</body>
</html>
